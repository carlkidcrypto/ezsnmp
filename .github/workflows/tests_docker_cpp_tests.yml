name: Run Dockerized Cpp Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Added explicit permissions so the publish-unit-test-result action can create check runs
permissions:
  contents: write
  checks: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            .github/workflows/tests_docker_cpp_tests.yml
            cpp_tests/**
            docker/**
            ezsnmp/**/*.cpp
            ezsnmp/**/*.h
            python_tests/*.conf
            python_tests/*.py
            python_tests/requirements.txt
            setup.cfg
            setup.py
            tox.ini

  test-cpp-tests:
    needs: check-changes
    if: needs.check-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        distro:
          - almalinux10_netsnmp_5.9
          - archlinux_netsnmp_5.7
          - archlinux_netsnmp_5.8
          - archlinux_netsnmp_5.9
          - centos7_netsnmp_5.7
          - centos8_netsnmp_5.8
          - fedora41_netsnmp_5.7
          - fedora41_netsnmp_5.8
          - fedora41_netsnmp_5.9
          - rockylinux8_netsnmp_5.8
          - rockylinux9_netsnmp_5.9
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Run unit tests inside the Docker container (${{ matrix.distro }})
        run: |
           cd docker/
           chmod +x run_cpp_tests_in_all_dockers.sh
           ./run_cpp_tests_in_all_dockers.sh ${{ matrix.distro }}

      - name: Upload Test Results (${{ matrix.distro }})
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: cpp-test-results-dockerized-${{ matrix.distro }}
          path: |
            docker/test_outputs_${{ matrix.distro }}/test-results.xml
            docker/test_outputs_${{ matrix.distro }}/test-outputs.txt
            docker/test_outputs_${{ matrix.distro }}/lcov_coverage.info

  upload-cpp-coverage-dockerized:
    runs-on: ubuntu-latest
    needs: [check-changes, test-cpp-tests]
    permissions:
      contents: read
    if: needs.check-changes.outputs.any_changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cpp-test-results-dockerized-*
          path: artifacts/

      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./artifacts/**/lcov_coverage.info
          flags: cpp,docker
          fail_ci_if_error: false
          verbose: true

  comment-cpp-test-report:
    runs-on: ubuntu-latest
    needs: [check-changes, test-cpp-tests]
    permissions:
      pull-requests: write # Needed to create/update PR comments
      contents: write      # Needed to read artifacts/content for check run
      checks: write        # Needed to create/update check runs
    if: needs.check-changes.outputs.any_changed == 'true'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cpp-test-results-dockerized-*
          path: artifacts/

      - name: List files
        run: ls -Rlah artifacts/

      - name: Publish C++ Test Results (Dockerized Tests)
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: needs.check-changes.outputs.any_changed == 'true'
        with:
          files: "artifacts/**/test-results.xml"
          check_name: C++ Test Results - Dockerized
          comment_title: C++ Test Results - Dockerized