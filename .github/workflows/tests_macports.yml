# This workflow runs tests for the EzSnmp package using MacPorts
# on macOS runners across multiple Python versions.
# It checks for changes in the source code and runs tests only if there are changes.
name: Tests With MacPorts Package Manager
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  check-source-changes:
    runs-on: ubuntu-latest
    outputs:
      run_job: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Sourcecode
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            .github/workflows/tests_macports.yml
            ezsnmp/**/*.cpp
            ezsnmp/**/*.h
            python_tests/*.conf
            python_tests/*.py
            python_tests/requirements.txt
            setup.cfg
            setup.py

  build-and-test:
    runs-on: ${{ matrix.os }}
    needs: check-source-changes
    timeout-minutes: 30
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.13"
    if: needs.check-source-changes.outputs.run_job == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
  
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          allow-prereleases: true
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install pip dependencies
        run: |
          if [ -f python_tests/requirements.txt ]; then pip install -r python_tests/requirements.txt; fi

      - name: Install MacPorts
        run: |
          set -euo pipefail
          MACOS_MAJOR=$(sw_vers -productVersion | awk -F'.' '{print $1}')
          case "$MACOS_MAJOR" in
            15)
              PKG_URL="https://github.com/macports/macports-base/releases/download/v2.12.3/MacPorts-2.12.3-15-Sequoia.pkg";;
            14)
              PKG_URL="https://github.com/macports/macports-base/releases/download/v2.12.3/MacPorts-2.12.3-14-Sonoma.pkg";;
            26)
              PKG_URL="https://github.com/macports/macports-base/releases/download/v2.12.3/MacPorts-2.12.3-26-Tahoe.pkg";;
            *)
              PKG_URL="https://github.com/macports/macports-base/releases/download/v2.12.3/MacPorts-2.12.3-14-Sonoma.pkg";;
          esac
          echo "Using MacPorts package: $PKG_URL"
          curl -L -o macports.pkg "$PKG_URL"
          sudo installer -pkg macports.pkg -target /
          echo "PATH=/opt/local/bin:/opt/local/sbin:$PATH" >> $GITHUB_ENV
          sudo /opt/local/bin/port -v selfupdate

      - name: Prepare MacPorts cache directories
        run: |
          set -euo pipefail
          sudo mkdir -p /opt/local/var/macports/distfiles
          sudo mkdir -p /opt/local/var/macports/software
          sudo chown -R $(id -un) /opt/local/var/macports/distfiles /opt/local/var/macports/software

      - name: Cache MacPorts distfiles
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /opt/local/var/macports/distfiles
          key: macports-distfiles-${{ matrix.os }}
          restore-keys: |
            macports-distfiles-

      - name: Cache MacPorts archives
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /opt/local/var/macports/software
          key: macports-archives-${{ matrix.os }}
          restore-keys: |
            macports-archives-

      - name: Set up MacPorts dependencies
        run: |
          set -euo pipefail
          # Clean any potentially corrupted archives and rebuild if installation fails
          if ! sudo /opt/local/bin/port install net-snmp openssl3; then
            echo "Installation failed, performing aggressive cleanup and retrying..."
            # Uninstall any partially installed packages
            sudo /opt/local/bin/port uninstall net-snmp openssl3 || true
            # Clean all ports including dependencies
            sudo /opt/local/bin/port clean --all all || true
            # Remove cached archives
            sudo rm -rf /opt/local/var/macports/software/* || true
            # Remove build directories
            sudo rm -rf /opt/local/var/macports/build/* || true
            # Reclaim disk space
            sudo /opt/local/bin/port reclaim || true
            # Retry installation
            sudo /opt/local/bin/port install net-snmp openssl3
          fi
          mkdir -p -m 0755 ~/.snmp
          echo 'mibs +ALL' > ~/.snmp/snmp.conf

      - name: Start SNMP daemon
        run: |
          set -euo pipefail
          SNMPD=/opt/local/sbin/snmpd
          mibdir="-M +/opt/local/share/snmp/mibs"
          # Create persistent config store file to silence repeated read_config_store warnings
          sudo mkdir -p /opt/local/var/net-snmp
          if [ ! -f /opt/local/var/net-snmp/snmpd.conf ]; then
            echo "# persistent config store" | sudo tee /opt/local/var/net-snmp/snmpd.conf >/dev/null
          fi
          # Remove or comment unsupported directives (e.g., smuxsocket) from test config for MacPorts net-snmp 5.9.4
          CONFIG_SRC="configs/snmpd.conf"
          CONFIG_TMP="${RUNNER_TEMP}/snmpd.conf.macports"
          if grep -q '^smuxsocket' "$CONFIG_SRC"; then
            sed '/^smuxsocket/ s/^/# disabled on macports: /' "$CONFIG_SRC" > "$CONFIG_TMP"
          else
            cp "$CONFIG_SRC" "$CONFIG_TMP"
          fi
          echo "Launching snmpd with config: $CONFIG_TMP"
          $SNMPD -C -c "$CONFIG_TMP" -r -Le $mibdir -m ALL || {
            echo "snmpd failed to start" >&2; exit 1; }

      - name: Run Tests
        run: |
          set -euo pipefail
          python3 -m pip install . --verbose
          rm -drf build/ ezsnmp.egg-info/
          pytest -v -s --cov=ezsnmp --cov-report=term-missing --junitxml=test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml python_tests/ | tee test-outputs_${{ matrix.os }}_${{ matrix.python-version }}.txt || true
          # Ensure a placeholder junit file exists even if pytest failed to write one
          if [ ! -f test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml ]; then echo "<testsuite></testsuite>" > test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml; fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: pytest-results_${{matrix.os}}_${{matrix.python-version}}
          path: |
            test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml
            test-outputs_${{ matrix.os }}_${{ matrix.python-version }}.txt
          if-no-files-found: warn

  comment-pytest-coverage-report:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: needs.build-and-test.result != 'skipped'
    permissions:
      contents: write    # For creating commit comments on push
      pull-requests: write # This is needed to create/update comments
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pytest-results_*
          merge-multiple: false

      - name: Pytest coverage comment
        id: pytest-coverage
        uses: MishaKav/pytest-coverage-comment@287292879eaaff04116f36d3eb1a670f6e5df1a4 # v1.7.1
        with:
          title: Pytest Coverage Report - MacPorts
          unique-id-for-comment: macports
          hide-badge: true
          hide-report: true
          create-new-comment: false
          hide-comment: true
          report-only-changed-files: false
          multiple-files: |
            macos-latest - MacPorts - 3.10, pytest-results_macos-latest_3.10/test-outputs_macos-latest_3.10.txt, pytest-results_macos-latest_3.10/test-results_macos-latest_3.10.xml
            macos-latest - MacPorts - 3.11, pytest-results_macos-latest_3.11/test-outputs_macos-latest_3.11.txt, pytest-results_macos-latest_3.11/test-results_macos-latest_3.11.xml
            macos-latest - MacPorts - 3.12, pytest-results_macos-latest_3.12/test-outputs_macos-latest_3.12.txt, pytest-results_macos-latest_3.12/test-results_macos-latest_3.12.xml
            macos-latest - MacPorts - 3.13, pytest-results_macos-latest_3.13/test-outputs_macos-latest_3.13.txt, pytest-results_macos-latest_3.13/test-results_macos-latest_3.13.xml
            macos-latest - MacPorts - 3.14, pytest-results_macos-latest_3.14/test-outputs_macos-latest_3.14.txt, pytest-results_macos-latest_3.14/test-results_macos-latest_3.14.xml

      - name: Strip leading newlines from summaryReport
        id: clean-report
        env:
          SUMMARY_REPORT: ${{ steps.pytest-coverage.outputs.summaryReport }}
        run: |
          python3 -c "
          import os, json
          report = os.environ.get('SUMMARY_REPORT', '')
          try:
              decoded = json.loads(report)
              if isinstance(decoded, str):
                  report = decoded
          except (json.JSONDecodeError, ValueError):
              pass
          report = report.lstrip('\n')
          delimiter = 'GHADELIMITER'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'report<<{delimiter}\n')
              f.write(report)
              if not report.endswith('\n'):
                  f.write('\n')
              f.write(f'{delimiter}\n')
          "

      - name: Find existing pytest coverage comment (PR)
        id: find-pytest-comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- pytest-coverage-macports -->'

      - name: Post collapsible pytest coverage comment (PR)
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@2b6bdb56ad3073fa0e4beef00447158f55a18414 # v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-pytest-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- pytest-coverage-macports -->
            ## Pytest Coverage Report - MacPorts 🐍
            <details>
            <summary>📊 Test Results (click to expand)</summary>

            ${{ steps.clean-report.outputs.report }}
            </details>

      - name: Post pytest coverage comment (Push)
        if: github.event_name == 'push'
        uses: peter-evans/commit-comment@f6d60c65d05bb59f750fa51ad3de1d443ba0eb52 # v4
        with:
          body: |
            ## Pytest Coverage Report - MacPorts 🐍
            <details>
            <summary>📊 Test Results (click to expand)</summary>

            ${{ steps.clean-report.outputs.report }}
            </details>
