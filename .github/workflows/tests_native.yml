# This workflow runs tests for the EzSnmp package using native package manager
# on multiple operating systems and Python versions.
# It checks for changes in the source code and runs tests only if there are changes.
name: Tests With Native Package Manager
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-source-changes:
    runs-on: ubuntu-latest
    outputs:
      run_job: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Sourcecode
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            .github/workflows/tests_native.yml
            ezsnmp/**/*.cpp
            ezsnmp/**/*.h
            python_tests/*.conf
            python_tests/*.py
            python_tests/requirements.txt
            setup.cfg
            setup.py
            tox.ini

  build-and-test:
    runs-on: ${{ matrix.os }}
    needs: check-source-changes
    timeout-minutes: 15
    if: needs.check-source-changes.outputs.run_job == 'true'
    strategy:
      fail-fast: false
      matrix:
          # macOS is intentionally excluded: the macOS system net-snmp (5.6.x) is no longer
          # supported. macOS testing is covered by tests_homebrew.yml and tests_macports.yml,
          # where a supported version of net-snmp is installed via Homebrew or MacPorts.
          os: [ubuntu-latest]
          python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Set up dependencies
        uses: carlkidcrypto/os-specific-runner@efb93fedfd29ca19926cbc08707d66734288c78d # v2.2.0
        with:
          linux: sudo apt-get update;
                 sudo apt-get install -y snmpd libsnmp-dev libperl-dev snmp-mibs-downloader;
                 sudo systemctl stop snmpd;
                 sudo download-mibs;
                 mkdir -p -m 0755 ~/.snmp;
                 echo 'mibs +ALL' > ~/.snmp/snmp.conf;

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          allow-prereleases: true
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache tox environments
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .tox
          key: tox-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('python_tests/requirements.txt', 'tox.ini') }}
          restore-keys: |
            tox-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install pip dependencies
        run: |
          if [ -f python_tests/requirements.txt ]; then pip install -r python_tests/requirements.txt; fi

      - name: Start SNMP daemon
        run: |
          mibdir="-M +/var/lib/snmp/mibs"
          SNMPD=$(which snmpd)
          $SNMPD -C -c configs/snmpd.conf -r -Le $mibdir -m ALL
      
      - name: Run Tests
        run: |
          python3 -m pip install . --verbose
          rm -drf build/ ezsnmp.egg-info/
          TOX_ENV="py${{ matrix.python-version }}"
          TOX_ENV="${TOX_ENV/./}"
          tox -e "$TOX_ENV" | tee test-outputs_${{ matrix.os }}_${{ matrix.python-version }}.txt
          mv test-results.xml test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml
          # Generate coverage summary file (pytest-cov already collected data)
          if [ -f .coverage ]; then coverage report > pytest-coverage_${{ matrix.os }}_${{ matrix.python-version }}.txt || true; fi
          # Rename coverage.xml for artifact upload (generated by tox.ini configuration)
          if [ -f coverage.xml ]; then mv coverage.xml coverage_${{ matrix.os }}_${{ matrix.python-version }}.xml; fi

      - name: Upload Test Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v5
        with:
          name: pytest-results_${{matrix.os}}_${{matrix.python-version}}
          path: |
            test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml
            test-outputs_${{ matrix.os }}_${{ matrix.python-version }}.txt
            pytest-coverage_${{ matrix.os }}_${{ matrix.python-version }}.txt
            coverage_${{ matrix.os }}_${{ matrix.python-version }}.xml

  upload-python-coverage-native:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pytest-results_*
          merge-multiple: true

      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage_*.xml
          flags: python,native
          fail_ci_if_error: false
          verbose: true

  comment-pytest-coverage-report:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      pull-requests: write # This is needed to create/update PR comments
      contents: write # Needed for commit comments when workflow runs on push
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pytest-results_*
          merge-multiple: false

      - name: List files
        run: ls -R pytest-results_*

      - name: Pytest coverage comment
        id: pytest-coverage
        uses: MishaKav/pytest-coverage-comment@287292879eaaff04116f36d3eb1a670f6e5df1a4 # v1.7.1
        with:
          title: Pytest Coverage Report - Native
          unique-id-for-comment: native-tests
          hide-badge: true
          hide-report: true
          create-new-comment: false
          hide-comment: true
          report-only-changed-files: false
          multiple-files: |
            ubuntu-latest - Native - 3.10, pytest-results_ubuntu-latest_3.10/test-outputs_ubuntu-latest_3.10.txt, pytest-results_ubuntu-latest_3.10/test-results_ubuntu-latest_3.10.xml
            ubuntu-latest - Native - 3.11, pytest-results_ubuntu-latest_3.11/test-outputs_ubuntu-latest_3.11.txt, pytest-results_ubuntu-latest_3.11/test-results_ubuntu-latest_3.11.xml
            ubuntu-latest - Native - 3.12, pytest-results_ubuntu-latest_3.12/test-outputs_ubuntu-latest_3.12.txt, pytest-results_ubuntu-latest_3.12/test-results_ubuntu-latest_3.12.xml
            ubuntu-latest - Native - 3.13, pytest-results_ubuntu-latest_3.13/test-outputs_ubuntu-latest_3.13.txt, pytest-results_ubuntu-latest_3.13/test-results_ubuntu-latest_3.13.xml
            ubuntu-latest - Native - 3.14, pytest-results_ubuntu-latest_3.14/test-outputs_ubuntu-latest_3.14.txt, pytest-results_ubuntu-latest_3.14/test-results_ubuntu-latest_3.14.xml

      - name: Strip leading newlines from summaryReport
        id: clean-report
        env:
          SUMMARY_REPORT: ${{ steps.pytest-coverage.outputs.summaryReport }}
        run: |
          python3 -c "
          import os, json
          report = os.environ.get('SUMMARY_REPORT', '')
          try:
              decoded = json.loads(report)
              if isinstance(decoded, str):
                  report = decoded
          except (json.JSONDecodeError, ValueError):
              pass
          report = report.lstrip('\n')
          delimiter = 'GHADELIMITER'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'report<<{delimiter}\n')
              f.write(report)
              if not report.endswith('\n'):
                  f.write('\n')
              f.write(f'{delimiter}\n')
          "

      - name: Find existing pytest coverage comment (PR)
        id: find-pytest-comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- pytest-coverage-native -->'

      - name: Post collapsible pytest coverage comment (PR)
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@2b6bdb56ad3073fa0e4beef00447158f55a18414 # v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-pytest-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- pytest-coverage-native -->
            ## Pytest Coverage Report - Native 🐍
            <details>
            <summary>📊 Test Results (click to expand)</summary>

            ${{ steps.clean-report.outputs.report }}
            </details>

      - name: Post pytest coverage comment (Push)
        if: github.event_name == 'push'
        uses: peter-evans/commit-comment@f6d60c65d05bb59f750fa51ad3de1d443ba0eb52 # v4
        with:
          body: |
            ## Pytest Coverage Report - Native 🐍
            <details>
            <summary>📊 Test Results (click to expand)</summary>

            ${{ steps.clean-report.outputs.report }}
            </details>
