# This workflow runs tests for the EzSnmp package using Homebrew package manager
# on multiple operating systems and Python versions.
# It checks for changes in the source code and runs tests only if there are changes.
name: Tests With Homebrew
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]
jobs:
  verify-syntax:
    permissions: { contents: read }
    uses: ./.github/workflows/verify_syntax.yml
  check-source-changes:
    needs: verify-syntax
    runs-on: ubuntu-latest
    outputs:
      run_job: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Sourcecode
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            .github/workflows/tests_homebrew.yml
            ezsnmp/**/*.cpp
            ezsnmp/**/*.h
            Formula/ezsnmp.rb
            python_tests/*.conf
            python_tests/*.py
            python_tests/requirements.txt
            setup.cfg
            setup.py

  build-and-test:
    runs-on: ${{ matrix.os }}
    needs: check-source-changes
    timeout-minutes: 15
    if: needs.check-source-changes.outputs.run_job == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@e58f0b60d43355cab9d13c7ecf58a4fbfced93c2 # master

      - name: Set up dependencies
        uses: carlkidcrypto/os-specific-runner@6bfb32d4934b42e6817f3f4109c9f3c26abc9fab # v2.3.1
        with:
          linux: sudo apt-get update;
                 sudo apt-get install -y snmpd snmp-mibs-downloader valgrind;
                 sudo apt-get purge libsnmp-dev libperl-dev -y;
                 brew update;
                 brew install net-snmp;
                 brew install openssl@3;
                 sudo systemctl stop snmpd;
                 sudo download-mibs;
                 mkdir -p -m 0755 ~/.snmp;
                 echo 'mibs +ALL' > ~/.snmp/snmp.conf;

          macos: brew update;
                 brew install net-snmp;
                 brew install openssl@3;
                 brew install python@${{ matrix.python-version }} || true;
                 echo "export PATH=\"$(brew --prefix net-snmp)/bin:\$PATH\"" >> ~/.zshrc;
                 export PATH="$(brew --prefix net-snmp)/bin:$PATH";
                 echo "export PATH=\"$(brew --prefix net-snmp)/sbin:\$PATH\"" >> ~/.zshrc;
                 export PATH="$(brew --prefix net-snmp)/sbin:$PATH";
                 mkdir -p -m 0755 ~/.snmp;
                 echo 'mibs +ALL' > ~/.snmp/snmp.conf;

      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          allow-prereleases: true
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install pip dependencies
        run: |
          if [ -f python_tests/requirements.txt ]; then pip install -r python_tests/requirements.txt; fi

      - name: Start SNMP daemon
        run: |
          if [ "$RUNNER_OS" == "Linux" ]
          then
            mibdir="-M +/var/lib/snmp/mibs"
            SNMPD=$(which snmpd)
          elif [ "$RUNNER_OS" == "macOS" ]
          then
            # On macOS, check for Homebrew MIB directories (both Intel and Apple Silicon)
            if [ -d "/opt/homebrew/share/snmp/mibs" ]; then
              mibdir="-M +/opt/homebrew/share/snmp/mibs"
            elif [ -d "/usr/local/share/snmp/mibs" ]; then
              mibdir="-M +/usr/local/share/snmp/mibs"
            else
              mibdir=""
            fi
            SNMPD=$(which snmpd)
          else
            mibdir=""
            SNMPD=$(which.exe snmpd)
          fi
          $SNMPD -C -c configs/snmpd.conf -r -Le $mibdir -m ALL

      - name: Run Tests
        uses: carlkidcrypto/os-specific-runner@6bfb32d4934b42e6817f3f4109c9f3c26abc9fab # v2.3.1
        with:
          linux: |
                 export LD_LIBRARY_PATH=/home/linuxbrew/.linuxbrew/lib:${LD_LIBRARY_PATH:-}
                 export CFLAGS="-I/home/linuxbrew/.linuxbrew/include"
                 export LDFLAGS="-L/home/linuxbrew/.linuxbrew/lib"
                 export PKG_CONFIG_PATH="/home/linuxbrew/.linuxbrew/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
                 python3 -m pip install . --verbose
                 rm -drf build/ ezsnmp.egg-info/
                 mv ezsnmp _ezsnmp
                 wget https://raw.githubusercontent.com/python/cpython/main/Misc/valgrind-python.supp;
                 VALGRIND=(
                   'valgrind'
                   '--tool=memcheck'
                   '--leak-check=full'
                   '--show-leak-kinds=definite,indirect,possible'
                   '--suppressions=./valgrind-python.supp'
                   '--log-file=./valgrind_${{ matrix.os }}_${{ matrix.python-version }}.out'
                   '--error-exitcode=0'
                 );
                 echo 'PYTHONMALLOC=malloc' >> $GITHUB_OUTPUT;
                 ${VALGRIND[@]} pytest -v -s --cov=ezsnmp \
                   --cov-report=term-missing \
                   --junitxml=test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml \
                   python_tests/ | tee ./test-outputs_${{ matrix.os }}_${{ matrix.python-version }}.txt;

          macos: |
            # Package the current checkout as a tarball and point the formula at it
            git archive HEAD --format=tar.gz -o /tmp/ezsnmp_source.tar.gz
            TARBALL_SHA=$(shasum -a 256 /tmp/ezsnmp_source.tar.gz | awk '{print $1}')
            PKG_VERSION=$(python3 -c "
            import re, sys
            content = open('setup.cfg').read()
            m = re.search(r'^version\s*=\s*(.+)$', content, re.MULTILINE)
            if not m:
                sys.exit('ERROR: could not find version field in setup.cfg')
            print(m.group(1).strip())
            ")
            # Formula/ezsnmp.rb is a symlink; dereference it into a real file so
            # we can modify it, then put it back so brew sees a tap path.
            cp -L Formula/ezsnmp.rb /tmp/ezsnmp_formula.rb
            sed -i '' "s|url \".*\"|url \"file:///tmp/ezsnmp_source.tar.gz\"|" /tmp/ezsnmp_formula.rb
            sed -i '' "s|sha256 \".*\"|sha256 \"${TARBALL_SHA}\"|" /tmp/ezsnmp_formula.rb
            # Add an explicit version stanza so Homebrew does not fail to detect
            # the version from the local tarball URL (which has no version in its name).
            python3 - << PYEOF
            import re
            formula = open('/tmp/ezsnmp_formula.rb').read()
            pkg_version = '${PKG_VERSION}'
            # Check for an existing version stanza line (e.g. '  version "..."')
            if not re.search(r'^\s+version\s+"', formula, re.MULTILINE):
                formula = re.sub(
                    r'(\s+sha256\s+"[^"]+")',
                    r'\1' + '\n  version "' + pkg_version + '"',
                    formula, count=1
                )
            open('/tmp/ezsnmp_formula.rb', 'w').write(formula)
            PYEOF
            rm Formula/ezsnmp.rb
            cp /tmp/ezsnmp_formula.rb Formula/ezsnmp.rb
            # Remove any pre-existing ezsnmp install to prevent version conflicts.
            # Try both short name and fully-qualified name to catch all cases.
            HOMEBREW_NO_AUTO_UPDATE=1 brew uninstall --force ezsnmp 2>/dev/null || true
            HOMEBREW_NO_AUTO_UPDATE=1 brew uninstall --force carlkidcrypto/ezsnmp/ezsnmp 2>/dev/null || true
            # setup-homebrew may have already registered carlkidcrypto/ezsnmp tap
            # pointing at the GitHub remote (old release).  Force-untap so our
            # local checkout with the modified formula always takes precedence.
            brew untap carlkidcrypto/ezsnmp 2>/dev/null || true
            # Register the local checkout as a Homebrew tap, then install from it.
            # brew install --formula <path> is rejected unless the file is inside a
            # registered tap; tapping the local directory is the correct approach.
            # --force ensures the local path overrides any pre-existing tap pointing
            # at the GitHub remote, even if brew untap above did not fully clean up.
            HOMEBREW_NO_AUTO_UPDATE=1 brew tap --force carlkidcrypto/ezsnmp "$(pwd)"
            # HOMEBREW_NO_INSTALL_FROM_API prevents Homebrew from using the formula
            # API. --build-from-source forces building from the tarball above instead
            # of restoring any cached bottle from a previous run, ensuring the
            # freshly-packaged source (with all local fixes) is always compiled.
            HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_FROM_API=1 brew reinstall --build-from-source carlkidcrypto/ezsnmp/ezsnmp
            # Force-overwrite any conflicting files/symlinks so the newly installed
            # version is what Python finds in the global site-packages.
            brew link --overwrite ezsnmp 2>/dev/null || true
            # Determine which Python the formula used and where it installed the package
            BREW_EZSNMP=$(brew --prefix ezsnmp)
            PYTHON_VER=$(ls "${BREW_EZSNMP}/lib/" | grep -E '^python[0-9]+\.[0-9]+$' | sort -V | tail -1 | sed 's/python//')
            BREW_PYTHON=$(brew --prefix python@${PYTHON_VER})/bin/python3
            # Verify behavior, not source text: an installed package with the
            # empty-OID early-return fix must return () for get/get_next([]).
            # This avoids brittle grep checks that fail across harmless refactors.
            ${BREW_PYTHON} - <<'PYEOF'
            from ezsnmp import Session
            from ezsnmp import session as session_module

            s = Session(hostname="localhost", version=2, community="public")
            assert s.get([]) == (), f"get([]) did not return (), loaded from {session_module.__file__}"
            assert s.get_next([]) == (), f"get_next([]) did not return (), loaded from {session_module.__file__}"
            PYEOF
            # Create an isolated test venv that inherits the brew Python's site-packages
            # (where brew link already placed the installed ezsnmp package)
            ${BREW_PYTHON} -m venv /tmp/test_venv --system-site-packages
            /tmp/test_venv/bin/pip install -r python_tests/requirements.txt
            # Hide source directory to prevent shadowing
            mv ezsnmp _ezsnmp
            set -o pipefail
            /tmp/test_venv/bin/pytest -v -s --cov=ezsnmp \
              --cov-report=term-missing \
              --junitxml=test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml \
              python_tests/ | tee test-outputs_${{ matrix.os }}_${{ matrix.python-version }}.txt

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: pytest-results_${{matrix.os}}_${{matrix.python-version}}
          path: |
            test-results_${{ matrix.os }}_${{ matrix.python-version }}.xml
            test-outputs_${{ matrix.os }}_${{ matrix.python-version }}.txt

      - name: Upload Valgrind Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          name: valgrind-report_${{matrix.os}}_${{matrix.python-version}}
          path: ./valgrind_${{ matrix.os }}_${{ matrix.python-version }}.out

  comment-pytest-coverage-report:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always() && needs.build-and-test.result != 'skipped'
    permissions:
      contents: write    # For creating commit comments on push
      pull-requests: write # This is needed to create/update comments
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pytest-results_*
          merge-multiple: false

      - name: Pytest coverage comment
        id: pytest-coverage
        uses: MishaKav/pytest-coverage-comment@fd9adbdca9fdfbe2b9bfa44a7340e6a83346ce6c # v1.10.0
        with:
          title: Pytest Coverage Report - Homebrew
          unique-id-for-comment: homebrew
          hide-badge: true
          hide-report: true
          create-new-comment: false
          hide-comment: true
          report-only-changed-files: false
          multiple-files: |
            macos-latest - Homebrew - 3.10, pytest-results_macos-latest_3.10/test-outputs_macos-latest_3.10.txt, pytest-results_macos-latest_3.10/test-results_macos-latest_3.10.xml
            macos-latest - Homebrew - 3.11, pytest-results_macos-latest_3.11/test-outputs_macos-latest_3.11.txt, pytest-results_macos-latest_3.11/test-results_macos-latest_3.11.xml
            macos-latest - Homebrew - 3.12, pytest-results_macos-latest_3.12/test-outputs_macos-latest_3.12.txt, pytest-results_macos-latest_3.12/test-results_macos-latest_3.12.xml
            macos-latest - Homebrew - 3.13, pytest-results_macos-latest_3.13/test-outputs_macos-latest_3.13.txt, pytest-results_macos-latest_3.13/test-results_macos-latest_3.13.xml
            macos-latest - Homebrew - 3.14, pytest-results_macos-latest_3.14/test-outputs_macos-latest_3.14.txt, pytest-results_macos-latest_3.14/test-results_macos-latest_3.14.xml
            ubuntu-latest - Homebrew - 3.10, pytest-results_ubuntu-latest_3.10/test-outputs_ubuntu-latest_3.10.txt, pytest-results_ubuntu-latest_3.10/test-results_ubuntu-latest_3.10.xml
            ubuntu-latest - Homebrew - 3.11, pytest-results_ubuntu-latest_3.11/test-outputs_ubuntu-latest_3.11.txt, pytest-results_ubuntu-latest_3.11/test-results_ubuntu-latest_3.11.xml
            ubuntu-latest - Homebrew - 3.12, pytest-results_ubuntu-latest_3.12/test-outputs_ubuntu-latest_3.12.txt, pytest-results_ubuntu-latest_3.12/test-results_ubuntu-latest_3.12.xml
            ubuntu-latest - Homebrew - 3.13, pytest-results_ubuntu-latest_3.13/test-outputs_ubuntu-latest_3.13.txt, pytest-results_ubuntu-latest_3.13/test-results_ubuntu-latest_3.13.xml
            ubuntu-latest - Homebrew - 3.14, pytest-results_ubuntu-latest_3.14/test-outputs_ubuntu-latest_3.14.txt, pytest-results_ubuntu-latest_3.14/test-results_ubuntu-latest_3.14.xml

      - name: Strip leading newlines from summaryReport
        id: clean-report
        env:
          SUMMARY_REPORT: ${{ steps.pytest-coverage.outputs.summaryReport }}
        run: |
          python3 -c "
          import os, json
          report = os.environ.get('SUMMARY_REPORT', '')
          try:
              decoded = json.loads(report)
              if isinstance(decoded, str):
                  report = decoded
          except (json.JSONDecodeError, ValueError):
              pass
          report = report.lstrip('\n')
          delimiter = 'GHADELIMITER'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'report<<{delimiter}\n')
              f.write(report)
              if not report.endswith('\n'):
                  f.write('\n')
              f.write(f'{delimiter}\n')
          "

      - name: Find existing pytest coverage comment (PR)
        id: find-pytest-comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- pytest-coverage-homebrew -->'

      - name: Post collapsible pytest coverage comment (PR)
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@2b6bdb56ad3073fa0e4beef00447158f55a18414 # v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-pytest-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- pytest-coverage-homebrew -->
            ## Pytest Coverage Report - Homebrew 🐍
            <details>
            <summary>📊 Test Results (click to expand)</summary>

            ${{ steps.clean-report.outputs.report }}
            </details>

      - name: Post pytest coverage comment (Push)
        if: github.event_name == 'push'
        uses: peter-evans/commit-comment@f6d60c65d05bb59f750fa51ad3de1d443ba0eb52 # v4
        with:
          body: |
            ## Pytest Coverage Report - Homebrew 🐍
            <details>
            <summary>📊 Test Results (click to expand)</summary>

            ${{ steps.clean-report.outputs.report }}
            </details>

  make-stripped-valgrind-files:
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: valgrind-report_*
          merge-multiple: false

      - name: Parse Valgrind Reports
        run: |
          python - << "EOF"
          with open("./valgrind-report_${{matrix.os}}_${{matrix.python-version}}/valgrind_${{ matrix.os }}_${{ matrix.python-version }}.out") as f:
              data = f.readlines()
          last_five_lines = data[-5:]
          with open('./valgrind-stripped_${{ matrix.os }}_${{ matrix.python-version }}.log', 'w') as f:
              f.write('```sh\n')
              f.writelines(last_five_lines)
              f.write('```\n')
          EOF

      - name: Upload Stripped Valgrind Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: valgrind-stripped_${{matrix.os}}_${{matrix.python-version}}
          path: |
            valgrind-stripped_${{ matrix.os }}_${{ matrix.python-version }}.log

  comment-valgrind:
    runs-on: ubuntu-latest
    needs: make-stripped-valgrind-files

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: valgrind-stripped_*
          merge-multiple: false

      - name: Set Env Variables
        id: valgrind_stripped_vars
        run: |
         temp1=$(cat valgrind-stripped_ubuntu-latest_3.10/valgrind-stripped_ubuntu-latest_3.10.log);
         temp2=$(cat valgrind-stripped_ubuntu-latest_3.11/valgrind-stripped_ubuntu-latest_3.11.log);
         temp3=$(cat valgrind-stripped_ubuntu-latest_3.12/valgrind-stripped_ubuntu-latest_3.12.log);
         temp4=$(cat valgrind-stripped_ubuntu-latest_3.13/valgrind-stripped_ubuntu-latest_3.13.log);
         temp5=$(cat valgrind-stripped_ubuntu-latest_3.14/valgrind-stripped_ubuntu-latest_3.14.log);
         echo VALGRIND_STRIPPED_UBUNTU_LATEST_3_10=$temp1 >> $GITHUB_OUTPUT;
         echo VALGRIND_STRIPPED_UBUNTU_LATEST_3_11=$temp2 >> $GITHUB_OUTPUT;
         echo VALGRIND_STRIPPED_UBUNTU_LATEST_3_12=$temp3 >> $GITHUB_OUTPUT;
         echo VALGRIND_STRIPPED_UBUNTU_LATEST_3_13=$temp4 >> $GITHUB_OUTPUT;
         echo VALGRIND_STRIPPED_UBUNTU_LATEST_3_14=$temp5 >> $GITHUB_OUTPUT;

      - name: Checkout Sourcecode
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Render Valgrind Comment Template
        id: template
        uses: chuhlomin/render-template@a7c644e341797d050d1cb24332d83791b9a46dae # v1.12
        with:
          template: .github/comment-valgrind-template.md
          vars: |
           py3_10: "${{ steps.valgrind_stripped_vars.outputs.VALGRIND_STRIPPED_UBUNTU_LATEST_3_10 }}"
           py3_11: "${{ steps.valgrind_stripped_vars.outputs.VALGRIND_STRIPPED_UBUNTU_LATEST_3_11 }}"
           py3_12: "${{ steps.valgrind_stripped_vars.outputs.VALGRIND_STRIPPED_UBUNTU_LATEST_3_12 }}"
           py3_13: "${{ steps.valgrind_stripped_vars.outputs.VALGRIND_STRIPPED_UBUNTU_LATEST_3_13 }}"
           py3_14: "${{ steps.valgrind_stripped_vars.outputs.VALGRIND_STRIPPED_UBUNTU_LATEST_3_14 }}"

      - name: Find existing PR comment (Valgrind)
        id: find-valgrind-comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- ezsnmp-homebrew-valgrind -->'

      - name: Create A Comment For PR
        uses: peter-evans/create-or-update-comment@2b6bdb56ad3073fa0e4beef00447158f55a18414 # v5
        if: github.event_name == 'pull_request'
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-valgrind-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Valgrind (Homebrew) 🔍
            <!-- ezsnmp-homebrew-valgrind -->
            ${{ steps.template.outputs.result }}

      - name: Create A Comment For Push
        uses: peter-evans/commit-comment@f6d60c65d05bb59f750fa51ad3de1d443ba0eb52 # v4
        if: github.event_name == 'push'
        with:
          body: ${{ steps.template.outputs.result }}
