name: Integration Tests (Docker)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            .github/workflows/integration_tests_docker.yml
            docker/**
            ezsnmp/**/*.cpp
            ezsnmp/**/*.h
            integration_tests/**
            configs/snmpd.conf
            python_tests/*.py
            setup.cfg
            setup.py

  integration-tests-docker:
    needs: check-changes
    if: needs.check-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        distribution: [almalinux10_netsnmp_5.9, archlinux_netsnmp_5.7, archlinux_netsnmp_5.8, archlinux_netsnmp_5.9, centos7_netsnmp_5.7, centos8_netsnmp_5.8, fedora41_netsnmp_5.7, fedora41_netsnmp_5.8, fedora41_netsnmp_5.9, rockylinux8_netsnmp_5.8, rockylinux9_netsnmp_5.9]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Compute Docker image cache key
        id: cache-key
        run: |
          WEEK_KEY=$(date -u +"%Y-%V")
          echo "week=$WEEK_KEY" >> $GITHUB_OUTPUT

      - name: Restore cached Docker image tar
        id: cache-restore
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .docker-image-cache/${{ matrix.distribution }}.tar
          key: docker-image-${{ matrix.distribution }}-${{ steps.cache-key.outputs.week }}-v1
          restore-keys: |
            docker-image-${{ matrix.distribution }}-

      - name: Load Docker image from cache (if present)
        run: |
          set -euo pipefail
          TAR_PATH=".docker-image-cache/${{ matrix.distribution }}.tar"
          if [ -f "$TAR_PATH" ]; then
            echo "Loading cached image from $TAR_PATH"
            if ! docker load -i "$TAR_PATH"; then
              echo "WARNING: docker load failed (corrupt/stale tar). Removing and falling through to pull."
              rm -f "$TAR_PATH"
            fi
          else
            echo "No cached image tar found. Will pull from registry."
          fi

      - name: Pull Docker image (with registry fallback)
        run: |
          set -euo pipefail
          DHUB_IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          GHCR_IMAGE="ghcr.io/carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          if docker pull "$DHUB_IMAGE"; then
            echo "Pulled from Docker Hub: $DHUB_IMAGE"
          elif docker pull "$GHCR_IMAGE"; then
            echo "Docker Hub unavailable; pulled from GHCR: $GHCR_IMAGE"
            docker tag "$GHCR_IMAGE" "$DHUB_IMAGE"
          else
            echo "ERROR: Failed to pull image from both Docker Hub and GHCR." >&2
            exit 1
          fi

      - name: Save Docker image to cache tar
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .docker-image-cache
          IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          TAR_PATH=".docker-image-cache/${{ matrix.distribution }}.tar"
          docker save "$IMAGE" -o "$TAR_PATH"

      - name: Start container and SNMP daemon
        run: |
          set -euo pipefail
          IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          CONTAINER_NAME="${{ matrix.distribution }}_integration_container"
          ENTRY_SCRIPT="/usr/local/bin/DockerEntry.sh"
          HOST_SOURCE_PATH="$PWD"
          CONTAINER_WORK_DIR="/ezsnmp"
          echo ">>> Starting container: $CONTAINER_NAME"
          echo "    - Using host source path: $HOST_SOURCE_PATH"
          echo "    - Mounting to: $CONTAINER_WORK_DIR"
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          if ! docker run -d \
            --name "$CONTAINER_NAME" \
            -v "$HOST_SOURCE_PATH:$CONTAINER_WORK_DIR" \
            "$IMAGE" \
            /bin/bash -c "$ENTRY_SCRIPT false & tail -f /dev/null"; then
              echo "ERROR: Docker run failed for $IMAGE" >&2
              exit 1
          fi
          echo ">>> Waiting for SNMP daemon to start..."
          sleep 10

      - name: Build and install ezsnmp in container
        run: |
          set -euo pipefail
          CONTAINER_NAME="${{ matrix.distribution }}_integration_container"
          echo ">>> Building and installing ezsnmp inside container"
          docker exec -t "$CONTAINER_NAME" bash -c '
            set -e
            export PATH=/usr/local/bin:/opt/rh/gcc-toolset-11/root/usr/bin:/opt/rh/gcc-toolset-13/root/usr/bin:/opt/rh/devtoolset-11/root/usr/bin:$PATH
            export LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64:${LD_LIBRARY_PATH:-}
            cd /ezsnmp
            echo "    - Installing ezsnmp"
            python3 -m pip install . --quiet
            echo "    - Build complete"
          '

      - name: Run integration tests
        run: |
          set -euo pipefail
          CONTAINER_NAME="${{ matrix.distribution }}_integration_container"
          echo ">>> Running integration tests inside container: $CONTAINER_NAME"
          docker exec -t "$CONTAINER_NAME" bash -c '
            set -e
            export PATH=/usr/local/bin:/opt/rh/gcc-toolset-11/root/usr/bin:/opt/rh/gcc-toolset-13/root/usr/bin:/opt/rh/devtoolset-11/root/usr/bin:$PATH
            export LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64:${LD_LIBRARY_PATH:-}
            cd /ezsnmp/integration_tests
            echo "    - Starting integration tests"
            if ./run_integration_tests.sh > /ezsnmp/integration_tests_full.log 2>&1; then
              echo "    - Integration tests completed successfully"
            else
              echo "    - Integration tests reported failures (continuing to collect artifacts)"
            fi
            exit 0
          '

      - name: Collect artifacts from container
        if: always()
        run: |
          set -euo pipefail
          CONTAINER_NAME="${{ matrix.distribution }}_integration_container"
          mkdir -p integration_results

          # Copy the main log file
          if docker exec "$CONTAINER_NAME" test -f /ezsnmp/integration_tests_full.log; then
            docker cp "$CONTAINER_NAME:/ezsnmp/integration_tests_full.log" \
              integration_results/integration_tests_${{ matrix.distribution }}.log

            # Extract key metrics into per-file logs (matching native workflow behavior)
            cd integration_results
            LOG_FILE="integration_tests_${{ matrix.distribution }}.log"

            grep "Total execution time:" "$LOG_FILE" > total_execution_time_${{ matrix.distribution }}.log || true
            grep "usm_unknown_security_name_counter:" "$LOG_FILE" > usm_unknown_security_name_counter_${{ matrix.distribution }}.log || true
            grep "connection_error_counter:" "$LOG_FILE" > connection_error_counter_${{ matrix.distribution }}.log || true

            # Try to extract test_file_descriptors from the results directory
            OUT_DIR=$(grep -m1 "Results saved to:" "$LOG_FILE" | sed 's/Results saved to: //' | tr -d '\r') || true
            if [ -n "$OUT_DIR" ]; then
              # OUT_DIR is a path inside the container, try to copy from container
              docker cp "$CONTAINER_NAME:$OUT_DIR/test_file_descriptors.log" test_file_descriptors_${{ matrix.distribution }}.log 2>/dev/null || true
            fi

            # Fallback: grep relevant lines if file wasn't copied
            if [ ! -f "test_file_descriptors_${{ matrix.distribution }}.log" ]; then
              grep -A2 "Running file descriptor tests" "$LOG_FILE" > test_file_descriptors_${{ matrix.distribution }}.log || true
            fi

            cd ..
          fi

          # Find and copy the test_results directory
          RESULTS_DIR=$(docker exec "$CONTAINER_NAME" bash -c 'ls -dt /ezsnmp/integration_tests/test_results_* 2>/dev/null | head -1' || echo "")
          if [ -n "$RESULTS_DIR" ] && [ "$RESULTS_DIR" != "" ]; then
            echo "Found results directory: $RESULTS_DIR"
            docker cp "$CONTAINER_NAME:$RESULTS_DIR" integration_results/test_results_${{ matrix.distribution }}/ || true
          else
            echo "No test_results directory found"
          fi

      - name: Extract test metrics
        if: always()
        run: |
          set -euo pipefail
          LOG_FILE="integration_results/integration_tests_${{ matrix.distribution }}.log"
          if [ -f "$LOG_FILE" ]; then
            echo "=== Test Summary for ${{ matrix.distribution }} ==="
            grep -E "(PASS:|FAIL:|COMPLETED:|Total execution time:)" "$LOG_FILE" || echo "No test summary found"
            echo ""
            echo "=== Checking for errors ==="
            grep -i "error\|fail\|segfault\|signal 11" "$LOG_FILE" | head -20 || echo "No critical errors found"
          fi

      - name: Stop and remove container
        if: always()
        run: |
          docker rm -f "${{ matrix.distribution }}_integration_container" >/dev/null 2>&1 || true

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: integration-test-results-docker_${{ matrix.distribution }}
          path: |
            integration_results/**

  summary:
    needs: integration-tests-docker
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: integration-test-results-docker_*
          merge-multiple: true

      - name: Generate test summary
        run: |
          python3 -c "
          import os
          import re
          import statistics

          data = {}
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.startswith('integration_tests_') and file.endswith('.log'):
                      with open(os.path.join(root, file)) as f:
                          for line in f:
                              m = re.search(r'(\w+): - (\d+) - (?:.+): (.+)', line.strip())
                              if m:
                                  test_type, num, value = m.groups()
                                  try:
                                      val = float(value.split()[0])
                                  except (ValueError, IndexError):
                                      continue
                                  data.setdefault((test_type, int(num)), []).append(val)

          summary = '<!-- integration-test-docker-summary -->\n## Integration Tests (Docker) Results \u23f1\ufe0f\n\n'

          if not data:
              summary += 'No test results found.\n'
          else:
              summary += '<details>\n<summary>\U0001f680 Performance Details (aggregated across all distributions)</summary>\n\n'
              categories = {}
              for (test_type, num) in sorted(data):
                  parts = test_type.split('_')
                  try:
                      idx = parts.index('snmp')
                      cat = ' '.join(p.title() for p in parts[:idx])
                      op  = ' '.join(p.title() for p in parts[idx+1:])
                  except ValueError:
                      cat = parts[0].title()
                      op  = ' '.join(p.title() for p in parts[1:])
                  categories.setdefault(cat, []).append((op, num, data[(test_type, num)]))
              for cat in sorted(categories):
                  summary += f'#### {cat} Tests\n\n'
                  summary += '| Operation | Workers | Min (s) | Max (s) | Avg (s) | StdDev \U0001f4ca |\n'
                  summary += '|-----------|---------|---------|---------|---------|----------|\n'
                  for op, num, vals in sorted(categories[cat], key=lambda x: (x[0], x[1])):
                      if len(vals) > 1:
                          summary += f'| {op} | {num} | {min(vals):.3f} | {max(vals):.3f} | {statistics.mean(vals):.3f} | {statistics.stdev(vals):.3f} |\n'
                      else:
                          summary += f'| {op} | {num} | {vals[0]:.3f} | {vals[0]:.3f} | {vals[0]:.3f} | N/A |\n'
                  summary += '\n'
              summary += '</details>\n\n'

          fd_records = []
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.startswith('test_file_descriptors_') and file.endswith('.log'):
                      with open(os.path.join(root, file)) as f:
                          content = f.read()
                      cur = None
                      for line in content.split('\n'):
                          rm = re.search(r'Running (work_(?:get|op)_(?:no_close|close)):\s*(\S+)(?:\s+(\S+))?', line)
                          if rm:
                              if cur and 'session' in cur:
                                  fd_records.append(cur)
                              mode_raw, op_or_sess, sess_opt = rm.groups()
                              cur = {'session': sess_opt if sess_opt else op_or_sess,
                                     'operation': op_or_sess if sess_opt else 'unknown',
                                     'mode': 'no close' if 'no_close' in mode_raw else 'close'}
                              continue
                          if cur is None:
                              continue
                          m = re.search(r'Subprocess PID:? Open FDs before:\s*(\d+)', line)
                          if m:
                              cur['fd_before'] = int(m.group(1))
                          m = re.search(r'Subprocess PID\s*Open FDs after:\s*(\d+)', line)
                          if m:
                              cur['fd_after'] = int(m.group(1))
                          m = re.search(r'Total execution time:\s*([\d.]+)', line)
                          if m:
                              cur['exec_time'] = float(m.group(1))
                          m = re.search(r'Average time per SNMP call.*?:\s*([\d.]+)', line)
                          if m:
                              cur['avg_time'] = float(m.group(1))
                      if cur and 'session' in cur:
                          fd_records.append(cur)

          if fd_records:
              grouped = {}
              for rec in fd_records:
                  key = (rec['session'], rec.get('operation', 'unknown'), rec['mode'])
                  g = grouped.setdefault(key, {'fd_before': [], 'fd_after': [], 'exec_time': [], 'avg_time': []})
                  for fld in ('fd_before', 'fd_after', 'exec_time', 'avg_time'):
                      if fld in rec:
                          g[fld].append(rec[fld])
              leaks = sum(
                  1 for g in grouped.values()
                  if g['fd_before'] and g['fd_after']
                  and statistics.mean(g['fd_after']) > statistics.mean(g['fd_before'])
              )
              status = f'\u26a0\ufe0f {leaks} potential leak(s) detected' if leaks else '\u2705 No leaks detected'
              summary += f'### \U0001f4c1 File Descriptor Tests: {status}\n\n'
              summary += '<details>\n<summary>\U0001f4cb FD Test Details (click to expand)</summary>\n\n'
              summary += '| Session | Operation | Mode | FD Leak | Exec (s) | Avg/Call (s) |\n'
              summary += '|---------|-----------|------|---------|----------|-------------|\n'
              for (sess, op, mode) in sorted(grouped):
                  g = grouped[(sess, op, mode)]
                  sd = sess.replace('SESS_', '').replace('_ARGS', '')
                  if g['fd_before'] and g['fd_after']:
                      lk = statistics.mean(g['fd_after']) - statistics.mean(g['fd_before'])
                      lk_icon = '\u26a0\ufe0f' if lk > 0 else '\u2705'
                      lk_str = f'{lk_icon} {lk:+.0f}'
                  else:
                      lk_str = 'N/A'
                  exec_list = g['exec_time']
                  avg_list = g['avg_time']
                  et = f'{statistics.mean(exec_list):.3f}' if exec_list else '-'
                  at = f'{statistics.mean(avg_list):.6f}' if avg_list else '-'
                  summary += f'| {sd} | {op} | {mode} | {lk_str} | {et} | {at} |\n'
              summary += '\n</details>\n\n\u2705 File descriptor tests completed successfully\n'
          else:
              summary += '### \U0001f4c1 File Descriptor Tests: \u274c No results found\n'

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)

          with open('integration_test_docker_summary.md', 'w') as f:
              f.write(summary)

          print('Summary generated successfully')
          "
          echo "Test summary generated"

      - name: Find existing integration-test-docker summary comment
        if: github.event_name == 'pull_request'
        id: find-integration-docker-comment
        uses: peter-evans/find-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- integration-test-docker-summary -->'

      - name: Update PR comment with integration-test-docker summary
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-integration-docker-comment.outputs.comment-id }}
          body-file: integration_test_docker_summary.md
          edit-mode: replace
          comment-tag: integration-test-docker-summary
