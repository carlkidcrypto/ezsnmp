name: Validate Workflow Files

on:
  push:
    paths:
      - '.github/workflows/*.yml'
      - '!.github/workflows/*.lock.yml'
      - '!.github/workflows/agentics-maintenance.yml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '!.github/workflows/*.lock.yml'
      - '!.github/workflows/agentics-maintenance.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Install yamllint
        run: python -m pip install yamllint

      - name: Lint workflow YAML files
        run: |
          set -e
          echo "Linting all workflow YAML files (excluding generated agentic lock files and agentics-maintenance.yml) in .github/workflows/ ..."
          find .github/workflows/ -name "*.yml" ! -name "*.lock.yml" ! -name "agentics-maintenance.yml" -print0 | xargs -0 yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}"
          echo "All workflow YAML files passed linting."
