name: Update Docker Python Versions

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docker-python-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Update Docker Python patch versions
        id: update-versions
        shell: bash
        run: |
          set -euo pipefail
          python .github/scripts/update_docker_python_versions.py --write

          if git diff --quiet -- docker; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.update-versions.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(docker): update Python patch versions in Dockerfiles"
          title: "🐍 Update Docker Python patch versions"
          body: |
            This PR updates the Python patch versions used by the Docker images.

            ### Updated files
            - `docker/**/Dockerfile`
            - `docker/cache/download_build_cache.sh`
            - `docker/**/README.rst`

            Generated by the `${{ github.workflow }}` workflow.
          branch: automation/update-docker-python-versions
          base: main
          delete-branch: true
          labels: dependencies, docker, automated-pr