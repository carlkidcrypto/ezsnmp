name: Valgrind PR History Report

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "How many days of PR history to analyze"
        required: false
        default: "0"
      max_prs:
        description: "Max number of recently updated PRs to scan"
        required: false
        default: "1000"
  schedule:
    - cron: "30 6 */3 * *"

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  verify-syntax:
    permissions: { contents: read }
    uses: ./.github/workflows/verify_syntax.yml
  analyze-valgrind-history:
    needs: verify-syntax
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Sourcecode
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Analyze Valgrind PR comment history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '0' }}
          MAX_PRS: ${{ github.event.inputs.max_prs || '1000' }}
        run: |
          python .github/scripts/analyze_valgrind_pr_history.py | tee valgrind-pr-history-console.log

      - name: Publish workflow summary
        run: cat valgrind-pr-history-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: valgrind-pr-history-report
          path: |
            valgrind-pr-history-report.md
            valgrind-pr-history-report.json
            valgrind-pr-history-console.log
