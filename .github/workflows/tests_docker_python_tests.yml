            fedora41_netsnmp_5.8_py310, test-outputs_fedora41_netsnmp_5.8_test_container_py310.txt, test-results_fedora41_netsnmp_5.8_test_container_py310.xml
            fedora41_netsnmp_5.8_py311, test-outputs_fedora41_netsnmp_5.8_test_container_py311.txt, test-results_fedora41_netsnmp_5.8_test_container_py311.xml
            fedora41_netsnmp_5.8_py312, test-outputs_fedora41_netsnmp_5.8_test_container_py312.txt, test-results_fedora41_netsnmp_5.8_test_container_py312.xml
            fedora41_netsnmp_5.8_py313, test-outputs_fedora41_netsnmp_5.8_test_container_py313.txt, test-results_fedora41_netsnmp_5.8_test_container_py313.xml
            fedora41_netsnmp_5.8_py314, test-outputs_fedora41_netsnmp_5.8_test_container_py314.txt, test-results_fedora41_netsnmp_5.8_test_container_py314.xml
            fedora41_netsnmp_5.9_py310, test-outputs_fedora41_netsnmp_5.9_test_container_py310.txt, test-results_fedora41_netsnmp_5.9_test_container_py310.xml
            fedora41_netsnmp_5.9_py311, test-outputs_fedora41_netsnmp_5.9_test_container_py311.txt, test-results_fedora41_netsnmp_5.9_test_container_py311.xml
            fedora41_netsnmp_5.9_py312, test-outputs_fedora41_netsnmp_5.9_test_container_py312.txt, test-results_fedora41_netsnmp_5.9_test_container_py312.xml
            fedora41_netsnmp_5.9_py313, test-outputs_fedora41_netsnmp_5.9_test_container_py313.txt, test-results_fedora41_netsnmp_5.9_test_container_py313.xml
            fedora41_netsnmp_5.9_py314, test-outputs_fedora41_netsnmp_5.9_test_container_py314.txt, test-results_fedora41_netsnmp_5.9_test_container_py314.xml
            rockylinux8_netsnmp_5.8_py310, test-outputs_rockylinux8_netsnmp_5.8_test_container_py310.txt, test-results_rockylinux8_netsnmp_5.8_test_container_py310.xml
            rockylinux8_netsnmp_5.8_py311, test-outputs_rockylinux8_netsnmp_5.8_test_container_py311.txt, test-results_rockylinux8_netsnmp_5.8_test_container_py311.xml
            rockylinux8_netsnmp_5.8_py312, test-outputs_rockylinux8_netsnmp_5.8_test_container_py312.txt, test-results_rockylinux8_netsnmp_5.8_test_container_py312.xml
            rockylinux8_netsnmp_5.8_py313, test-outputs_rockylinux8_netsnmp_5.8_test_container_py313.txt, test-results_rockylinux8_netsnmp_5.8_test_container_py313.xml
            rockylinux8_netsnmp_5.8_py314, test-outputs_rockylinux8_netsnmp_5.8_test_container_py314.txt, test-results_rockylinux8_netsnmp_5.8_test_container_py314.xml
            rockylinux9_netsnmp_5.9_py310, test-outputs_rockylinux9_netsnmp_5.9_test_container_py310.txt, test-results_rockylinux9_netsnmp_5.9_test_container_py310.xml
            rockylinux9_netsnmp_5.9_py311, test-outputs_rockylinux9_netsnmp_5.9_test_container_py311.txt, test-results_rockylinux9_netsnmp_5.9_test_container_py311.xml
            rockylinux9_netsnmp_5.9_py312, test-outputs_rockylinux9_netsnmp_5.9_test_container_py312.txt, test-results_rockylinux9_netsnmp_5.9_test_container_py312.xml
            rockylinux9_netsnmp_5.9_py313, test-outputs_rockylinux9_netsnmp_5.9_test_container_py313.txt, test-results_rockylinux9_netsnmp_5.9_test_container_py313.xml
            rockylinux9_netsnmp_5.9_py314, test-outputs_rockylinux9_netsnmp_5.9_test_container_py314.txt, test-results_rockylinux9_netsnmp_5.9_test_container_py314.xml

      - name: Strip leading newlines from summaryReport
        id: clean-report
        env:
          SUMMARY_REPORT: ${{ steps.pytest-coverage.outputs.summaryReport }}
        run: |
          python3 -c "
          import os, json
          report = os.environ.get('SUMMARY_REPORT', '')
          try:
              decoded = json.loads(report)
              if isinstance(decoded, str):
                  report = decoded
          except (json.JSONDecodeError, ValueError):
              pass
          report = report.lstrip('\n')
          delimiter = 'GHADELIMITER'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'report<<{delimiter}\n')
              f.write(report)
              if not report.endswith('\n'):
                  f.write('\n')
              f.write(f'{delimiter}\n')
          "

      - name: Find existing pytest coverage comment (PR)
        id: find-pytest-comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- pytest-coverage-dockerized -->'

      - name: Post collapsible pytest coverage comment (PR)
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@2b6bdb56ad3073fa0e4beef00447158f55a18414 # v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-pytest-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- pytest-coverage-dockerized -->
            ## Pytest Coverage Report - Dockerized Tests 🐍
            <details>
            <summary>📊 Test Results (click to expand)</summary>

            ${{ steps.clean-report.outputs.report }}
            </details>

      - name: Post pytest coverage comment (Push)
        if: github.event_name == 'push'
        uses: peter-evans/commit-comment@f6d60c65d05bb59f750fa51ad3de1d443ba0eb52 # v4
        with:
          body: |
            ## Pytest Coverage Report - Dockerized Tests 🐍
            <details>
            <summary>📊 Test Results (click to expand)</summary>

            ${{ steps.clean-report.outputs.report }}
            </details>