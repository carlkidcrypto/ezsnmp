name: Run Dockerized Python Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            .github/workflows/tests_docker_python_tests.yml
            docker/**
            ezsnmp/**/*.cpp
            ezsnmp/**/*.h
            python_tests/*.conf
            python_tests/*.py
            python_tests/requirements.txt
            setup.cfg
            setup.py

  test-python-tests:
    needs: check-changes
    if: needs.check-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        distribution: [almalinux10_netsnmp_5.9, archlinux_netsnmp_5.7, archlinux_netsnmp_5.8, archlinux_netsnmp_5.9, centos7_netsnmp_5.7, centos8_netsnmp_5.8, fedora41_netsnmp_5.7, fedora41_netsnmp_5.8, fedora41_netsnmp_5.9, rockylinux8_netsnmp_5.8, rockylinux9_netsnmp_5.9]
        python: [py310, py311, py312, py313, py314]
        test_group: [session, netsnmp, exceptions, misc]
        include:
          - test_group: session
            test_files: "python_tests/test_session.py"
          - test_group: netsnmp
            test_files: "python_tests/test_netsnmp.py"
          - test_group: exceptions
            test_files: "python_tests/test_exceptions.py python_tests/test_session_parameters.py python_tests/test_getters.py python_tests/test_helpers.py"
          - test_group: misc
            test_files: "python_tests/test_datatypes.py python_tests/test_logging.py python_tests/test_auth_priv_v3.py python_tests/test_cache_v3.py"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Compute Docker image cache key
        id: cache-key
        run: |
          WEEK_KEY=$(date -u +"%Y-%V")
          echo "week=$WEEK_KEY" >> $GITHUB_OUTPUT

      - name: Restore cached Docker image tar
        id: cache-restore
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .docker-image-cache/${{ matrix.distribution }}.tar
          key: docker-image-${{ matrix.distribution }}-${{ steps.cache-key.outputs.week }}-v1
          restore-keys: |
            docker-image-${{ matrix.distribution }}-

      - name: Load Docker image from cache (if present)
        run: |
          set -euo pipefail
          TAR_PATH=".docker-image-cache/${{ matrix.distribution }}.tar"
          if [ -f "$TAR_PATH" ]; then
            echo "Loading cached image from $TAR_PATH"
            if ! docker load -i "$TAR_PATH"; then
              echo "WARNING: docker load failed (corrupt/stale tar). Removing and falling through to pull."
              rm -f "$TAR_PATH"
            fi
          else
            echo "No cached image tar found. Will pull from registry."
          fi

      - name: Pull Docker image (with registry fallback)
        run: |
          set -euo pipefail
          DHUB_IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          GHCR_IMAGE="ghcr.io/carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          if docker pull "$DHUB_IMAGE"; then
            echo "Pulled from Docker Hub: $DHUB_IMAGE"
          elif docker pull "$GHCR_IMAGE"; then
            echo "Docker Hub unavailable; pulled from GHCR: $GHCR_IMAGE"
            docker tag "$GHCR_IMAGE" "$DHUB_IMAGE"
          else
            echo "ERROR: Failed to pull image from both Docker Hub and GHCR." >&2
            exit 1
          fi

      - name: Save Docker image to cache tar
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .docker-image-cache
          IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          TAR_PATH=".docker-image-cache/${{ matrix.distribution }}.tar"
          # Save or refresh the tar to ensure cache captures it
          docker save "$IMAGE" -o "$TAR_PATH"

      - name: Set up pip cache directory
        run: |
          mkdir -p ${{ runner.temp }}/pip-cache-${{ matrix.python }}
          chmod 777 ${{ runner.temp }}/pip-cache-${{ matrix.python }}

      - name: Cache pip packages for tox (Docker)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/pip-cache-${{ matrix.python }}
          key: pip-docker-${{ matrix.python }}-${{ hashFiles('python_tests/requirements.txt') }}
          restore-keys: |
            pip-docker-${{ matrix.python }}-

      - name: Start container and SNMP daemon
        run: |
          set -euo pipefail
          IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          CONTAINER_NAME="${{ matrix.distribution }}_test_container"
          ENTRY_SCRIPT="/usr/local/bin/DockerEntry.sh"
          HOST_SOURCE_PATH="$PWD"
          CONTAINER_WORK_DIR="/ezsnmp"
          echo ">>> Starting container: $CONTAINER_NAME"
          echo "    - Using host source path: $HOST_SOURCE_PATH"
          echo "    - Mounting to: $CONTAINER_WORK_DIR"
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          if ! docker run -d \
            --name "$CONTAINER_NAME" \
            -v "$HOST_SOURCE_PATH:$CONTAINER_WORK_DIR" \
            "$IMAGE" \
            /bin/bash -c "$ENTRY_SCRIPT false & tail -f /dev/null"; then
              echo "ERROR: Docker run failed for $IMAGE" >&2
              exit 1
          fi

      - name: Run pytest for ${{ matrix.python }} - ${{ matrix.test_group }}
        run: |
          set -euo pipefail
          CONTAINER_NAME="${{ matrix.distribution }}_test_container"
          # Build absolute paths on the runner to avoid complex quoting inside docker exec
          TEST_FILES_ABS=$(echo "${{ matrix.test_files }}" | tr ' ' '\n' | sed 's|^|/ezsnmp/|' | tr '\n' ' ')
          echo ">>> Executing pytest (${{ matrix.test_group }}) inside container: $CONTAINER_NAME"
          docker exec -t -e TEST_FILES_ABS="$TEST_FILES_ABS" "$CONTAINER_NAME" bash -c '
            set -e
            export PATH=/usr/local/bin:/opt/rh/gcc-toolset-11/root/usr/bin:/opt/rh/devtoolset-11/root/usr/bin:$PATH;
            export LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64:${LD_LIBRARY_PATH:-};
            PY_KEY="${{ matrix.python }}";
            PY_VER="${PY_KEY#py}";
            PYTHON_BIN="python${PY_VER:0:1}.${PY_VER:1}";
            VENV_DIR="/tmp/venv_${{ matrix.python }}";
            echo "    - Creating venv with $PYTHON_BIN at $VENV_DIR";
            "$PYTHON_BIN" -m venv "$VENV_DIR";
            echo "    - Installing test dependencies";
            "$VENV_DIR/bin/pip" install --quiet -r /ezsnmp/python_tests/requirements.txt;
            echo "    - Installing ezsnmp";
            cd /ezsnmp && "$VENV_DIR/bin/pip" install --quiet .;
            echo "    - Running pytest (${{ matrix.test_group }}): $TEST_FILES_ABS";
            if "$VENV_DIR/bin/pytest" -v -s --timeout=300 \
              --junitxml=/ezsnmp/test-results.xml \
              --cov=ezsnmp --cov-report=term-missing \
              --cov-report=xml:/ezsnmp/coverage.xml \
              --cov-config=/ezsnmp/.coveragerc \
              $TEST_FILES_ABS > /ezsnmp/test-outputs.txt 2>&1; then
              echo "    - Pytest completed for $PY_KEY (${{ matrix.test_group }})";
            else
              echo "    - Pytest reported failures for $PY_KEY (${{ matrix.test_group }}) (continuing to collect artifacts)";
            fi;
            exit 0;
          '

      - name: Collect artifacts
        if: always()
        run: |
          set -euo pipefail
          mkdir -p docker
          if [ -f test-results.xml ]; then \
            mv test-results.xml docker/test-results_${{ matrix.distribution }}_test_container_${{ matrix.python }}_${{ matrix.test_group }}.xml; \
          else \
            echo "<testsuite></testsuite>" > docker/test-results_${{ matrix.distribution }}_test_container_${{ matrix.python }}_${{ matrix.test_group }}.xml; \
          fi
          mv test-outputs.txt docker/test-outputs_${{ matrix.distribution }}_test_container_${{ matrix.python }}_${{ matrix.test_group }}.txt
          if [ -f coverage.xml ]; then \
            mv coverage.xml docker/coverage_${{ matrix.distribution }}_test_container_${{ matrix.python }}_${{ matrix.test_group }}.xml; \
          fi

      - name: Stop and remove container
        if: always()
        run: |
          docker rm -f "${{ matrix.distribution }}_test_container" >/dev/null 2>&1 || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: pytest-results_${{ matrix.distribution }}_${{ matrix.python }}_${{ matrix.test_group }}
          path: |
            docker/test-results_${{ matrix.distribution }}*.xml
            docker/test-outputs_${{ matrix.distribution }}*.txt
            docker/coverage_${{ matrix.distribution }}*.xml

  upload-python-coverage-dockerized:
    runs-on: ubuntu-latest
    needs: test-python-tests
    permissions:
      contents: read
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pytest-results_*
          merge-multiple: true

      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./docker/coverage_*.xml
          flags: python,docker
          fail_ci_if_error: false
          verbose: true

  comment-pytest-coverage-report:
    runs-on: ubuntu-latest
    needs: test-python-tests
    permissions:
      contents: write # This is needed to create/update commit comments
      pull-requests: write # This is needed to create/update comments
    if: always() 
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pytest-results_*
          merge-multiple: true 
      
      - name: List files
        run: ls -Rlah

      - name: Pytest coverage comment (Dockerized Tests)
        id: pytest-coverage
        uses: MishaKav/pytest-coverage-comment@dd5b80bde6d16941f336518e92929e89069d8451 # v1.7.2
        continue-on-error: true
        with:
          pytest-coverage-path: ""
          title: Pytest Coverage Report - Dockerized Tests
          unique-id-for-comment: dockerized-python-tests
          hide-badge: true
          hide-report: true
          create-new-comment: false
          hide-comment: true
          report-only-changed-files: false
