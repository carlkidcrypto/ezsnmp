name: Run Dockerized Python Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            .github/workflows/tests_docker_python_tests.yml
            docker/**
            ezsnmp/**/*.cpp
            ezsnmp/**/*.h
            python_tests/*.conf
            python_tests/*.py
            python_tests/requirements.txt
            setup.cfg
            setup.py
            tox.ini

  test-python-tests:
    needs: check-changes
    if: needs.check-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        distribution: [almalinux10_netsnmp_5.9, archlinux_netsnmp_5.7, archlinux_netsnmp_5.8, archlinux_netsnmp_5.9, centos7_netsnmp_5.7, centos8_netsnmp_5.8, fedora41_netsnmp_5.7, fedora41_netsnmp_5.8, fedora41_netsnmp_5.9, rockylinux8_netsnmp_5.8, rockylinux9_netsnmp_5.9]
        python: [py310, py311, py312, py313, py314]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Compute Docker image cache key
        id: cache-key
        run: |
          WEEK_KEY=$(date -u +"%Y-%V")
          echo "week=$WEEK_KEY" >> $GITHUB_OUTPUT

      - name: Restore cached Docker image tar
        id: cache-restore
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .docker-image-cache/${{ matrix.distribution }}.tar
          key: docker-image-${{ matrix.distribution }}-${{ steps.cache-key.outputs.week }}-v1
          restore-keys: |
            docker-image-${{ matrix.distribution }}-

      - name: Load Docker image from cache (if present)
        run: |
          set -euo pipefail
          TAR_PATH=".docker-image-cache/${{ matrix.distribution }}.tar"
          if [ -f "$TAR_PATH" ]; then
            echo "Loading cached image from $TAR_PATH"
            if ! docker load -i "$TAR_PATH"; then
              echo "WARNING: docker load failed (corrupt/stale tar). Removing and falling through to pull."
              rm -f "$TAR_PATH"
            fi
          else
            echo "No cached image tar found. Will pull from registry."
          fi

      - name: Pull Docker image (with registry fallback)
        run: |
          set -euo pipefail
          DHUB_IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          GHCR_IMAGE="ghcr.io/carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          if docker pull "$DHUB_IMAGE"; then
            echo "Pulled from Docker Hub: $DHUB_IMAGE"
          elif docker pull "$GHCR_IMAGE"; then
            echo "Docker Hub unavailable; pulled from GHCR: $GHCR_IMAGE"
            docker tag "$GHCR_IMAGE" "$DHUB_IMAGE"
          else
            echo "ERROR: Failed to pull image from both Docker Hub and GHCR." >&2
            exit 1
          fi

      - name: Save Docker image to cache tar
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .docker-image-cache
          IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          TAR_PATH=".docker-image-cache/${{ matrix.distribution }}.tar"
          # Save or refresh the tar to ensure cache captures it
          docker save "$IMAGE" -o "$TAR_PATH"

      - name: Set up pip cache directory
        run: |
          mkdir -p ${{ runner.temp }}/pip-cache-${{ matrix.python }}
          chmod 777 ${{ runner.temp }}/pip-cache-${{ matrix.python }}

      - name: Cache pip packages for tox (Docker)
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/pip-cache-${{ matrix.python }}
          key: pip-docker-${{ matrix.python }}-${{ hashFiles('python_tests/requirements.txt') }}
          restore-keys: |
            pip-docker-${{ matrix.python }}-

      - name: Start container and SNMP daemon
        run: |
          set -euo pipefail
          IMAGE="carlkidcrypto/ezsnmp_test_images:${{ matrix.distribution }}-latest"
          CONTAINER_NAME="${{ matrix.distribution }}_test_container"
          ENTRY_SCRIPT="/ezsnmp/docker/${{ matrix.distribution }}/DockerEntry.sh"
          HOST_SOURCE_PATH="$PWD"
          CONTAINER_WORK_DIR="/ezsnmp"
          echo ">>> Starting container: $CONTAINER_NAME"
          echo "    - Using host source path: $HOST_SOURCE_PATH"
          echo "    - Mounting to: $CONTAINER_WORK_DIR"
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          if ! docker run -d \
            --name "$CONTAINER_NAME" \
            -v "$HOST_SOURCE_PATH:$CONTAINER_WORK_DIR" \
            -v "$RUNNER_TEMP/pip-cache-${{ matrix.python }}:/pip-cache" \
            "$IMAGE" \
            /bin/bash -c "$ENTRY_SCRIPT false & tail -f /dev/null"; then
              echo "ERROR: Docker run failed for $IMAGE" >&2
              exit 1
          fi

      - name: Run tox for ${{ matrix.python }}
        run: |
          set -euo pipefail
          CONTAINER_NAME="${{ matrix.distribution }}_test_container"
          echo ">>> Executing tox tests inside container: $CONTAINER_NAME"
          docker exec -t "$CONTAINER_NAME" bash -c '
            set -e
            echo "    - Preparing environment and isolated work dirs";
            export PATH=/usr/local/bin:/opt/rh/gcc-toolset-11/root/usr/bin:/opt/rh/devtoolset-11/root/usr/bin:$PATH;
            export LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib64:$LD_LIBRARY_PATH;
            export WORK_DIR=/tmp/ezsnmp_${{ matrix.distribution }};
            export TOX_WORK_DIR=/tmp/tox_${{ matrix.distribution }};
            rm -rf "$WORK_DIR" "$TOX_WORK_DIR";
            mkdir -p "$WORK_DIR";
            echo "    - Copying sources to isolated directory";
            cd /ezsnmp && tar --exclude="*.egg-info" --exclude="build" --exclude="dist" --exclude=".tox" --exclude="__pycache__" --exclude="*.pyc" --exclude=".coverage*" --exclude="python3.*venv" --exclude="*.venv" --exclude="venv" -cf - . 2>/dev/null | (cd "$WORK_DIR" && tar xf -);
            cd "$WORK_DIR";
            echo "    - Installing tox";
            export PIP_CACHE_DIR=/pip-cache;
            python3 -m pip install --quiet tox;
            echo "    - Forcing pytest to write junit and coverage to /ezsnmp";
            export PYTEST_ADDOPTS="$PYTEST_ADDOPTS --junitxml=/ezsnmp/test-results.xml --cov-report=xml:/ezsnmp/coverage.xml";
            TOX_ENV="${{ matrix.python }}";
            echo "    - Running tox environment: $TOX_ENV";
            if tox -e "$TOX_ENV" --workdir "$TOX_WORK_DIR" > /ezsnmp/test-outputs.txt 2>&1; then
              echo "    - Tox completed for $TOX_ENV";
            else
              echo "    - Tox reported failures for $TOX_ENV (continuing to collect artifacts)";
            fi;
            echo "    - Copying coverage.xml to /ezsnmp/ if not already present";
            if [ -f "$WORK_DIR/coverage.xml" ] && [ ! -f /ezsnmp/coverage.xml ]; then
              cp "$WORK_DIR/coverage.xml" /ezsnmp/coverage.xml;
            fi;
            exit 0;
          '

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p docker
          if [ -f test-results.xml ]; then \
            mv test-results.xml docker/test-results_${{ matrix.distribution }}_test_container_${{ matrix.python }}.xml; \
          else \
            echo "<testsuite></testsuite>" > docker/test-results_${{ matrix.distribution }}_test_container_${{ matrix.python }}.xml; \
          fi
          mv test-outputs.txt docker/test-outputs_${{ matrix.distribution }}_test_container_${{ matrix.python }}.txt
          if [ -f coverage.xml ]; then \
            mv coverage.xml docker/coverage_${{ matrix.distribution }}_test_container_${{ matrix.python }}.xml; \
          fi

      - name: Stop and remove container
        if: always()
        run: |
          docker rm -f "${{ matrix.distribution }}_test_container" >/dev/null 2>&1 || true

      - name: Upload Test Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v5
        with:
          name: pytest-results_${{ matrix.distribution }}_${{ matrix.python }}
          path: |
            docker/test-results_${{ matrix.distribution }}*.xml
            docker/test-outputs_${{ matrix.distribution }}*.txt
            docker/coverage_${{ matrix.distribution }}*.xml

  upload-python-coverage-dockerized:
    runs-on: ubuntu-latest
    needs: test-python-tests
    permissions:
      contents: read
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pytest-results_*
          merge-multiple: true

      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./docker/coverage_*.xml
          flags: python,docker
          fail_ci_if_error: false
          verbose: true

  comment-pytest-coverage-report:
    runs-on: ubuntu-latest
    needs: test-python-tests
    permissions:
      contents: write # This is needed to create/update commit comments
      pull-requests: write # This is needed to create/update comments
    if: always() 
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pytest-results_*
          merge-multiple: true 
      
      - name: List files
        run: ls -Rlah

      - name: Pytest coverage comment (Dockerized Tests)
        id: pytest-coverage
        uses: MishaKav/pytest-coverage-comment@287292879eaaff04116f36d3eb1a670f6e5df1a4 # v1.7.1
        continue-on-error: true
        with:
          pytest-coverage-path: ""
          title: Pytest Coverage Report - Dockerized Tests
          unique-id-for-comment: dockerized-python-tests
          hide-badge: true
          hide-report: true
          create-new-comment: false
          hide-comment: true
          report-only-changed-files: false
          multiple-files: |
            almalinux10_netsnmp_5.9_py310, test-outputs_almalinux10_netsnmp_5.9_test_container_py310.txt, test-results_almalinux10_netsnmp_5.9_test_container_py310.xml
            almalinux10_netsnmp_5.9_py311, test-outputs_almalinux10_netsnmp_5.9_test_container_py311.txt, test-results_almalinux10_netsnmp_5.9_test_container_py311.xml
            almalinux10_netsnmp_5.9_py312, test-outputs_almalinux10_netsnmp_5.9_test_container_py312.txt, test-results_almalinux10_netsnmp_5.9_test_container_py312.xml
            almalinux10_netsnmp_5.9_py313, test-outputs_almalinux10_netsnmp_5.9_test_container_py313.txt, test-results_almalinux10_netsnmp_5.9_test_container_py313.xml
            almalinux10_netsnmp_5.9_py314, test-outputs_almalinux10_netsnmp_5.9_test_container_py314.txt, test-results_almalinux10_netsnmp_5.9_test_container_py314.xml
            archlinux_netsnmp_5.7_py310, test-outputs_archlinux_netsnmp_5.7_test_container_py310.txt, test-results_archlinux_netsnmp_5.7_test_container_py310.xml
            archlinux_netsnmp_5.7_py311, test-outputs_archlinux_netsnmp_5.7_test_container_py311.txt, test-results_archlinux_netsnmp_5.7_test_container_py311.xml
            archlinux_netsnmp_5.7_py312, test-outputs_archlinux_netsnmp_5.7_test_container_py312.txt, test-results_archlinux_netsnmp_5.7_test_container_py312.xml
            archlinux_netsnmp_5.7_py313, test-outputs_archlinux_netsnmp_5.7_test_container_py313.txt, test-results_archlinux_netsnmp_5.7_test_container_py313.xml
            archlinux_netsnmp_5.7_py314, test-outputs_archlinux_netsnmp_5.7_test_container_py314.txt, test-results_archlinux_netsnmp_5.7_test_container_py314.xml
            archlinux_netsnmp_5.8_py310, test-outputs_archlinux_netsnmp_5.8_test_container_py310.txt, test-results_archlinux_netsnmp_5.8_test_container_py310.xml
            archlinux_netsnmp_5.8_py311, test-outputs_archlinux_netsnmp_5.8_test_container_py311.txt, test-results_archlinux_netsnmp_5.8_test_container_py311.xml
            archlinux_netsnmp_5.8_py312, test-outputs_archlinux_netsnmp_5.8_test_container_py312.txt, test-results_archlinux_netsnmp_5.8_test_container_py312.xml
            archlinux_netsnmp_5.8_py313, test-outputs_archlinux_netsnmp_5.8_test_container_py313.txt, test-results_archlinux_netsnmp_5.8_test_container_py313.xml
            archlinux_netsnmp_5.8_py314, test-outputs_archlinux_netsnmp_5.8_test_container_py314.txt, test-results_archlinux_netsnmp_5.8_test_container_py314.xml
            archlinux_netsnmp_5.9_py310, test-outputs_archlinux_netsnmp_5.9_test_container_py310.txt, test-results_archlinux_netsnmp_5.9_test_container_py310.xml
            archlinux_netsnmp_5.9_py311, test-outputs_archlinux_netsnmp_5.9_test_container_py311.txt, test-results_archlinux_netsnmp_5.9_test_container_py311.xml
            archlinux_netsnmp_5.9_py312, test-outputs_archlinux_netsnmp_5.9_test_container_py312.txt, test-results_archlinux_netsnmp_5.9_test_container_py312.xml
            archlinux_netsnmp_5.9_py313, test-outputs_archlinux_netsnmp_5.9_test_container_py313.txt, test-results_archlinux_netsnmp_5.9_test_container_py313.xml
            archlinux_netsnmp_5.9_py314, test-outputs_archlinux_netsnmp_5.9_test_container_py314.txt, test-results_archlinux_netsnmp_5.9_test_container_py314.xml
            centos7_netsnmp_5.7_py310, test-outputs_centos7_netsnmp_5.7_test_container_py310.txt, test-results_centos7_netsnmp_5.7_test_container_py310.xml
            centos7_netsnmp_5.7_py311, test-outputs_centos7_netsnmp_5.7_test_container_py311.txt, test-results_centos7_netsnmp_5.7_test_container_py311.xml
            centos7_netsnmp_5.7_py312, test-outputs_centos7_netsnmp_5.7_test_container_py312.txt, test-results_centos7_netsnmp_5.7_test_container_py312.xml
            centos7_netsnmp_5.7_py313, test-outputs_centos7_netsnmp_5.7_test_container_py313.txt, test-results_centos7_netsnmp_5.7_test_container_py313.xml
            centos7_netsnmp_5.7_py314, test-outputs_centos7_netsnmp_5.7_test_container_py314.txt, test-results_centos7_netsnmp_5.7_test_container_py314.xml
            centos8_netsnmp_5.8_py310, test-outputs_centos8_netsnmp_5.8_test_container_py310.txt, test-results_centos8_netsnmp_5.8_test_container_py310.xml
            centos8_netsnmp_5.8_py311, test-outputs_centos8_netsnmp_5.8_test_container_py311.txt, test-results_centos8_netsnmp_5.8_test_container_py311.xml
            centos8_netsnmp_5.8_py312, test-outputs_centos8_netsnmp_5.8_test_container_py312.txt, test-results_centos8_netsnmp_5.8_test_container_py312.xml
            centos8_netsnmp_5.8_py313, test-outputs_centos8_netsnmp_5.8_test_container_py313.txt, test-results_centos8_netsnmp_5.8_test_container_py313.xml
            centos8_netsnmp_5.8_py314, test-outputs_centos8_netsnmp_5.8_test_container_py314.txt, test-results_centos8_netsnmp_5.8_test_container_py314.xml
            fedora41_netsnmp_5.7_py310, test-outputs_fedora41_netsnmp_5.7_test_container_py310.txt, test-results_fedora41_netsnmp_5.7_test_container_py310.xml
            fedora41_netsnmp_5.7_py311, test-outputs_fedora41_netsnmp_5.7_test_container_py311.txt, test-results_fedora41_netsnmp_5.7_test_container_py311.xml
            fedora41_netsnmp_5.7_py312, test-outputs_fedora41_netsnmp_5.7_test_container_py312.txt, test-results_fedora41_netsnmp_5.7_test_container_py312.xml
            fedora41_netsnmp_5.7_py313, test-outputs_fedora41_netsnmp_5.7_test_container_py313.txt, test-results_fedora41_netsnmp_5.7_test_container_py313.xml
