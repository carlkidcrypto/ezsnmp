name: "Sphinx Docs Build"

on:
  push:
    branches: [ main ]

  release:
    types: [ published ]

  workflow_dispatch:

jobs:
  # ── Build latest docs on push to main ─────────────────────────────────────
  sphinx_docs_build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.12 env for sphinx...
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sphinx-${{ hashFiles('sphinx_docs_build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sphinx-
            ${{ runner.os }}-pip-

      - name: Install Build Requirements
        run: |
          sudo apt update
          sudo apt install -y libsnmp-dev g++ python3-dev doxygen

      - name: Install Pip Requirements
        run: |
          cd ${{ github.workspace }}/sphinx_docs_build
          # Try to install requirements, if it fails then purge cache and retry
          if ! pip install -r requirements.txt; then
            echo "Installation failed, purging pip cache and retrying..."
            pip install --upgrade pip || true
            pip cache purge || true
            pip install -r requirements.txt
          fi
          pip install -r ${{ github.workspace }}/sphinx_docs_build/landing/requirements.txt

      - name: Run sphinx (latest)
        run: |
          cd ${{ github.workspace }}
          rm -drf build ezsnmp.egg-info
          python3 -m pip install . --verbose
          mkdir -p doxygen_docs_build
          doxygen .doxygen
          cd ${{ github.workspace }}/sphinx_docs_build
          mkdir -p source/_static
          mkdir -p source/_templates
          make clean && make html SPHINXOPTS="-W"

      - name: Build landing page
        run: |
          cd ${{ github.workspace }}/sphinx_docs_build/landing
          mkdir -p source/_static
          mkdir -p source/_templates
          make html SPHINXOPTS="-W"

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/

  deploy_pages:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: sphinx_docs_build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # ── Build versioned docs on release and commit back to main ───────────────
  sphinx_docs_build_release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository code at release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python 3.12 env for sphinx...
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sphinx-${{ hashFiles('sphinx_docs_build/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sphinx-
            ${{ runner.os }}-pip-

      - name: Install Build Requirements
        run: |
          sudo apt update
          sudo apt install -y libsnmp-dev g++ python3-dev doxygen

      - name: Install Pip Requirements
        run: |
          cd ${{ github.workspace }}/sphinx_docs_build
          if ! pip install -r requirements.txt; then
            echo "Installation failed, purging pip cache and retrying..."
            pip install --upgrade pip || true
            pip cache purge || true
            pip install -r requirements.txt
          fi
          pip install -r ${{ github.workspace }}/sphinx_docs_build/landing/requirements.txt

      - name: Build versioned docs
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          cd ${{ github.workspace }}
          rm -drf build ezsnmp.egg-info
          python3 -m pip install . --verbose
          mkdir -p doxygen_docs_build
          doxygen .doxygen
          cd ${{ github.workspace }}/sphinx_docs_build
          mkdir -p source/_static source/_templates
          sphinx-build -b html -W source/ "/tmp/html_${VERSION}/"

      - name: Switch to main branch
        run: |
          git fetch origin main
          git checkout main
          git pull origin main

      - name: Copy versioned docs into docs/
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          cp -r "/tmp/html_${VERSION}/" "${{ github.workspace }}/docs/html_${VERSION}/"

      - name: Update landing page version list
        run: |
          python3 - <<'EOF'
          import re, pathlib, sys

          docs_dir = pathlib.Path("${{ github.workspace }}/docs")
          index_rst = pathlib.Path("${{ github.workspace }}/sphinx_docs_build/landing/source/index.rst")

          # Collect all versioned dirs, newest first
          versions = sorted(
              [d.name for d in docs_dir.iterdir()
               if d.is_dir() and d.name.startswith("html_v")],
              reverse=True,
          )

          # Build RST list entries (always include Latest Alpha/Beta first)
          rst_items = ["* `Latest Alpha/Beta Version <./html/index.html>`_"]
          for v in versions:
              ver = v.replace("html_", "")  # e.g. "v2.3.0"
              rst_items.append(f"* `{ver} <./{v}/index.html>`_")
          versions_rst = "\n".join(rst_items)

          content = index_rst.read_text()
          new_content, sub_count = re.subn(
              r'\.\. VERSION_LIST_START\n.*?\.\. VERSION_LIST_END',
              f'.. VERSION_LIST_START\n\n{versions_rst}\n\n.. VERSION_LIST_END',
              content,
              flags=re.DOTALL,
          )

          if sub_count == 0:
              print("ERROR: VERSION_LIST_START/VERSION_LIST_END sentinels not found in index.rst", file=sys.stderr)
              sys.exit(1)

          index_rst.write_text(new_content)
          print("Updated landing/source/index.rst with versions:", versions)
          EOF

      - name: Build landing page with updated version list
        run: |
          cd ${{ github.workspace }}/sphinx_docs_build/landing
          mkdir -p source/_static
          mkdir -p source/_templates
          make html

      - name: Create Pull Request with versioned docs
        id: create-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: add versioned documentation for ${{ github.event.release.tag_name }}"
          title: "📚 Add versioned docs for ${{ github.event.release.tag_name }}"
          body: |
            This PR adds the versioned Sphinx documentation for release `${{ github.event.release.tag_name }}`.
            - Built from release tag: `${{ github.event.release.tag_name }}`
            - Run ID: ${{ github.run_id }}
            - Auto-merge enabled
          branch: docs/add-versioned-docs-${{ github.event.release.tag_name }}
          base: main
          delete-branch: true
          labels: documentation, automated-pr
          add-paths: |
            docs/html_${{ github.event.release.tag_name }}/
            sphinx_docs_build/landing/source/index.rst
            docs/index.html
            docs/.buildinfo
            docs/_static
            docs/_sources
            docs/genindex.html
            docs/search.html
            docs/searchindex.js
            docs/objects.inv

      - name: Enable Auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          echo "Attempting to auto-merge PR #$PR_NUMBER"
          gh pr merge --auto --merge "$PR_NUMBER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
