name: Integration Tests
permissions:
  pull-requests: write
  contents: read
concurrency: integration_tests
on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  check-source-changes:
    runs-on: ubuntu-latest
    outputs:
      run_job: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Sourcecode
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Check for changes in source code
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            .github/workflows/integration_tests.yml
            ezsnmp/**/*.cpp
            ezsnmp/**/*.h
            Formula/ezsnmp.rb
            integration_tests/**
            python_tests/*.conf
            python_tests/*.py
            setup.cfg
            setup.py

  build-and-integration-test:
    runs-on: ${{ matrix.os }}
    needs: check-source-changes
    timeout-minutes: 15
    if: needs.check-source-changes.outputs.run_job == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
  
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@e58f0b60d43355cab9d13c7ecf58a4fbfced93c2 # master

      - name: Set up dependencies
        uses: carlkidcrypto/os-specific-runner@efb93fedfd29ca19926cbc08707d66734288c78d # v2.2.0
        with:
          linux: sudo apt-get update;
                 sudo apt-get install -y snmpd snmp-mibs-downloader;
                 brew update;
                 brew install net-snmp;
                 brew install openssl@3;
                 sudo systemctl stop snmpd;
                 sudo download-mibs;
                 mkdir -p -m 0755 ~/.snmp;
                 echo 'mibs +ALL' > ~/.snmp/snmp.conf;
          
          macos: brew update;
                 brew install net-snmp;
                 brew install openssl@3;
                 brew install python@${{ matrix.python-version }} || true;
                 echo 'export PATH="/usr/local/opt/net-snmp/bin:$PATH"' >> ~/.zshrc;
                 export PATH="/usr/local/opt/net-snmp/bin:$PATH";
                 echo 'export PATH="/usr/local/opt/net-snmp/sbin:$PATH"' >> ~/.zshrc;
                 export PATH="/usr/local/opt/net-snmp/sbin:$PATH";
                 mkdir -p -m 0755 ~/.snmp;
                 echo 'mibs +ALL' > ~/.snmp/snmp.conf;

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          allow-prereleases: true
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install pip dependencies
        run: |
          # Integration tests don't need cibuildwheel, skip requirements.txt
          echo "Integration tests don't require additional pip dependencies"

      - name: Build source
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            export LD_LIBRARY_PATH=/home/linuxbrew/.linuxbrew/Cellar/net-snmp/5.9.4/lib:${LD_LIBRARY_PATH:-}
            python3 -m pip install . --verbose;
            rm -drf build/ ezsnmp.egg-info/;
          elif [ "$RUNNER_OS" == "macOS" ]; then
            # Package the current checkout as a tarball and point the formula at it
            git archive HEAD --format=tar.gz -o /tmp/ezsnmp_source.tar.gz
            TARBALL_SHA=$(shasum -a 256 /tmp/ezsnmp_source.tar.gz | awk '{print $1}')
            # Formula/ezsnmp.rb is a symlink; dereference it into a real file so
            # sed -i '' works, then put it back in Formula/ so brew sees a tap path
            cp -L Formula/ezsnmp.rb /tmp/ezsnmp_formula.rb
            sed -i '' "s|url \".*\"|url \"file:///tmp/ezsnmp_source.tar.gz\"|" /tmp/ezsnmp_formula.rb
            sed -i '' "s|sha256 \".*\"|sha256 \"${TARBALL_SHA}\"|" /tmp/ezsnmp_formula.rb
            rm Formula/ezsnmp.rb
            cp /tmp/ezsnmp_formula.rb Formula/ezsnmp.rb
            # Register the local checkout as a Homebrew tap, then install from it.
            # brew install --formula <path> is rejected unless the file is inside a
            # registered tap; tapping the local directory is the correct approach.
            brew tap carlkidcrypto/ezsnmp "$(pwd)"
            HOMEBREW_NO_AUTO_UPDATE=1 brew install carlkidcrypto/ezsnmp/ezsnmp
          fi
      
      - name: Start SNMP daemon
        run: |
          if [ "$RUNNER_OS" == "Linux" ]
          then
            mibdir="-M +/var/lib/snmp/mibs"
            SNMPD=$(which snmpd)
          elif [ "$RUNNER_OS" == "macOS" ]
          then
            mibdir=""
            SNMPD=$(which snmpd)
          else
            mibdir=""
            SNMPD=$(which.exe snmpd)
          fi
          $SNMPD -C -c configs/snmpd.conf -r -Le $mibdir -m ALL
      
      - name: Run Integration Tests (single)
        uses: carlkidcrypto/os-specific-runner@efb93fedfd29ca19926cbc08707d66734288c78d # v2.2.0
        with:
          linux: |
            export LD_LIBRARY_PATH=/home/linuxbrew/.linuxbrew/Cellar/net-snmp/5.9.4/lib:${LD_LIBRARY_PATH:-}
            cd /home/runner/work/ezsnmp/ezsnmp/integration_tests;
            ./run_integration_tests.sh 2>&1 | tee integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log;
            # Extract key metrics into per-file logs
            grep "Total execution time:" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log > total_execution_time_${{matrix.os}}_${{matrix.python-version}}.log || true
            grep "usm_unknown_security_name_counter:" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log > usm_unknown_security_name_counter_${{matrix.os}}_${{matrix.python-version}}.log || true
            grep "connection_error_counter:" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log > connection_error_counter_${{matrix.os}}_${{matrix.python-version}}.log || true
            # Try to copy the per-test file descriptor log from the output directory saved by the script
            OUT_DIR=$(grep -m1 "Results saved to:" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log | sed 's/Results saved to: //') || true
            if [ -n "$OUT_DIR" ] && [ -f "$OUT_DIR/test_file_descriptors.log" ]; then
              cp "$OUT_DIR/test_file_descriptors.log" test_file_descriptors_${{matrix.os}}_${{matrix.python-version}}.log || true
            else
              # Fallback: grep relevant lines
              grep -A2 "Running file descriptor tests" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log > test_file_descriptors_${{matrix.os}}_${{matrix.python-version}}.log || true
            fi
            echo "artifactPath1=/home/runner/work/ezsnmp/ezsnmp/integration_tests/total_execution_time_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
            echo "artifactPath2=/home/runner/work/ezsnmp/ezsnmp/integration_tests/usm_unknown_security_name_counter_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
            echo "artifactPath3=/home/runner/work/ezsnmp/ezsnmp/integration_tests/connection_error_counter_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
            echo "artifactPath4=/home/runner/work/ezsnmp/ezsnmp/integration_tests/test_file_descriptors_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
            echo "artifactPath5=/home/runner/work/ezsnmp/ezsnmp/integration_tests/integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;

          macos: |
            # Resolve the Python that brew installed ezsnmp for and put it first in PATH
            # so that `python3` calls inside run_integration_tests.sh use that interpreter
            BREW_EZSNMP=$(brew --prefix ezsnmp)
            PYTHON_VER=$(ls "${BREW_EZSNMP}/lib/" | grep -E '^python[0-9]+\.[0-9]+$' | sort -V | tail -1 | sed 's/python//')
            export PATH="$(brew --prefix python@${PYTHON_VER})/bin:${PATH}"
            cd /Users/runner/work/ezsnmp/ezsnmp/integration_tests;
            ./run_integration_tests.sh 2>&1 | tee integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log;
            # Extract key metrics into per-file logs
            grep "Total execution time:" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log > total_execution_time_${{matrix.os}}_${{matrix.python-version}}.log || true
            grep "usm_unknown_security_name_counter:" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log > usm_unknown_security_name_counter_${{matrix.os}}_${{matrix.python-version}}.log || true
            grep "connection_error_counter:" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log > connection_error_counter_${{matrix.os}}_${{matrix.python-version}}.log || true
            # Try to copy the per-test file descriptor log from the output directory saved by the script
            OUT_DIR=$(grep -m1 "Results saved to:" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log | sed 's/Results saved to: //') || true
            if [ -n "$OUT_DIR" ] && [ -f "$OUT_DIR/test_file_descriptors.log" ]; then
              cp "$OUT_DIR/test_file_descriptors.log" test_file_descriptors_${{matrix.os}}_${{matrix.python-version}}.log || true
            else
              # Fallback: grep relevant lines
              grep -A2 "Running file descriptor tests" integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log > test_file_descriptors_${{matrix.os}}_${{matrix.python-version}}.log || true
            fi
            echo "artifactPath1=/Users/runner/work/ezsnmp/ezsnmp/integration_tests/total_execution_time_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
            echo "artifactPath2=/Users/runner/work/ezsnmp/ezsnmp/integration_tests/usm_unknown_security_name_counter_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
            echo "artifactPath3=/Users/runner/work/ezsnmp/ezsnmp/integration_tests/connection_error_counter_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
            echo "artifactPath4=/Users/runner/work/ezsnmp/ezsnmp/integration_tests/test_file_descriptors_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
            echo "artifactPath5=/Users/runner/work/ezsnmp/ezsnmp/integration_tests/integration_tests_full_${{matrix.os}}_${{matrix.python-version}}.log" >> $GITHUB_ENV;
      
      - name: Upload Integration Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: integration-test-results_${{matrix.os}}_${{matrix.python-version}}
          path: |
            ${{ env.artifactPath1 }}
            ${{ env.artifactPath2 }}
            ${{ env.artifactPath3 }}
            ${{ env.artifactPath4 }}
            ${{ env.artifactPath5 }}

  pr-summary:
    needs: build-and-integration-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Prepare PR integration-test summary
        run: |
          python3 -c "
          import os
          import re
          import statistics

          data = {}
          for root, dirs, files in os.walk('artifacts'):
              for file in files:
                  if file.startswith('integration_tests_full_') and file.endswith('.log'):
                      with open(os.path.join(root, file)) as f:
                          for line in f:
                              m = re.search(r'(\w+): - (\d+) - (?:.+): (.+)', line.strip())
                              if m:
                                  test_type, num, value = m.groups()
                                  try:
                                      val = float(value.split()[0])
                                  except ValueError:
                                      continue
                                  data.setdefault((test_type, int(num)), []).append(val)

          summary = '<!-- integration-test-summary -->\n## Integration Test Results \u23f1\ufe0f\n\n'

          if data:
              summary += '<details>\n<summary>\U0001f680 Performance Details (aggregated across all OSes &amp; Python versions)</summary>\n\n'
              categories = {}
              for (test_type, num) in sorted(data):
                  parts = test_type.split('_')
                  try:
                      idx = parts.index('snmp')
                      cat = ' '.join(p.title() for p in parts[:idx])
                      op  = ' '.join(p.title() for p in parts[idx+1:])
                  except ValueError:
                      cat = parts[0].title()
                      op  = ' '.join(p.title() for p in parts[1:])
                  categories.setdefault(cat, []).append((op, num, data[(test_type, num)]))
              for cat in sorted(categories):
                  summary += f'#### {cat} Tests\n\n'
                  summary += '| Operation | Workers | Min (s) | Max (s) | Avg (s) | StdDev \U0001f4ca |\n'
                  summary += '|-----------|---------|---------|---------|---------|----------|\n'
                  for op, num, vals in sorted(categories[cat], key=lambda x: (x[0], x[1])):
                      if len(vals) > 1:
                          summary += f'| {op} | {num} | {min(vals):.3f} | {max(vals):.3f} | {statistics.mean(vals):.3f} | {statistics.stdev(vals):.3f} |\n'
                      else:
                          summary += f'| {op} | {num} | {vals[0]:.3f} | {vals[0]:.3f} | {vals[0]:.3f} | N/A |\n'
                  summary += '\n'
              summary += '</details>\n\n'

          fd_records = []
          for root, dirs, files in os.walk('artifacts'):
              for file in files:
                  if file.startswith('test_file_descriptors_') and file.endswith('.log'):
                      with open(os.path.join(root, file)) as f:
                          content = f.read()
                      cur = None
                      for line in content.split('\n'):
                          rm = re.search(r'Running (work_(?:get|op)_(?:no_close|close)):\s*(\S+)(?:\s+(\S+))?', line)
                          if rm:
                              if cur and 'session' in cur:
                                  fd_records.append(cur)
                              mode_raw, op_or_sess, sess_opt = rm.groups()
                              cur = {'session': sess_opt if sess_opt else op_or_sess,
                                     'operation': op_or_sess if sess_opt else 'unknown',
                                     'mode': 'no close' if 'no_close' in mode_raw else 'close'}
                              continue
                          if cur is None:
                              continue
                          m = re.search(r'Subprocess PID:? Open FDs before:\s*(\d+)', line)
                          if m:
                              cur['fd_before'] = int(m.group(1))
                          m = re.search(r'Subprocess PID\s*Open FDs after:\s*(\d+)', line)
                          if m:
                              cur['fd_after'] = int(m.group(1))
                          m = re.search(r'Total execution time:\s*([\d.]+)', line)
                          if m:
                              cur['exec_time'] = float(m.group(1))
                          m = re.search(r'Average time per SNMP call.*?:\s*([\d.]+)', line)
                          if m:
                              cur['avg_time'] = float(m.group(1))
                      if cur and 'session' in cur:
                          fd_records.append(cur)

          if fd_records:
              grouped = {}
              for rec in fd_records:
                  key = (rec['session'], rec.get('operation', 'unknown'), rec['mode'])
                  g = grouped.setdefault(key, {'fd_before': [], 'fd_after': [], 'exec_time': [], 'avg_time': []})
                  for fld in ('fd_before', 'fd_after', 'exec_time', 'avg_time'):
                      if fld in rec:
                          g[fld].append(rec[fld])
              leaks = sum(
                  1 for g in grouped.values()
                  if g['fd_before'] and g['fd_after']
                  and statistics.mean(g['fd_after']) > statistics.mean(g['fd_before'])
              )
              status = f'\u26a0\ufe0f {leaks} potential leak(s) detected' if leaks else '\u2705 No leaks detected'
              summary += f'### \U0001f4c1 File Descriptor Tests: {status}\n\n'
              summary += '<details>\n<summary>\U0001f4cb FD Test Details (click to expand)</summary>\n\n'
              summary += '| Session | Operation | Mode | FD Leak | Exec (s) | Avg/Call (s) |\n'
              summary += '|---------|-----------|------|---------|----------|-------------|\n'
              for (sess, op, mode) in sorted(grouped):
                  g = grouped[(sess, op, mode)]
                  sd = sess.replace('SESS_', '').replace('_ARGS', '')
                  if g['fd_before'] and g['fd_after']:
                      lk = statistics.mean(g['fd_after']) - statistics.mean(g['fd_before'])
                      lk_icon = '\u26a0\ufe0f' if lk > 0 else '\u2705'
                      lk_str = f'{lk_icon} {lk:+.0f}'
                  else:
                      lk_str = 'N/A'
                  exec_list = g['exec_time']
                  avg_list = g['avg_time']
                  et = f'{statistics.mean(exec_list):.3f}' if exec_list else '-'
                  at = f'{statistics.mean(avg_list):.6f}' if avg_list else '-'
                  summary += f'| {sd} | {op} | {mode} | {lk_str} | {et} | {at} |\n'
              summary += '\n</details>\n\n\u2705 File descriptor tests completed successfully\n'
          else:
              summary += '### \U0001f4c1 File Descriptor Tests: \u274c No results found\n'

          with open('integration_test_summary.md', 'w') as f:
              f.write(summary)
          "
          echo "Summary prepared: integration_test_summary.md"

      - name: Find existing integration-test summary comment
        id: find-integration-comment
        uses: peter-evans/find-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- integration-test-summary -->'

      - name: Update PR comment with integration-test summary
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-integration-comment.outputs.comment-id }}
          body-file: integration_test_summary.md
          edit-mode: replace
          comment-tag: integration-test-summary