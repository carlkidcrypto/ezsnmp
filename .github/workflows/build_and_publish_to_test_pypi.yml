# Refer to the following link for help
# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/

name: TestPyPI Distributions
concurrency: build_and_publish_to_test_pypi
on:
  push:
    branches: [ main ]

jobs:
  check-source-changes:
    runs-on: ubuntu-latest
    outputs:
      run_job: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Sourcecode
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Check for changes in setup.py/cfg
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            .github/workflows/build_and_publish_to_test_pypi.yml
            pyproject.toml
            setup.cfg
            setup.py
            requirements.txt

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: check-source-changes
    if: needs.check-source-changes.outputs.run_job == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
      - name: Cache pip dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
  
      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare Net-SNMP for Windows wheels
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $netSnmpVersion = '5.10.2'
          $workRoot = Join-Path $env:RUNNER_TEMP 'ezsnmp-windows-wheel'
          $sourceRoot = Join-Path $workRoot 'src'
          $installRoot = Join-Path $workRoot 'net-snmp'
          $archivePath = Join-Path $workRoot "net-snmp-$netSnmpVersion.zip"

          Remove-Item -Recurse -Force $workRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $workRoot, $sourceRoot, $installRoot | Out-Null

          choco install openssl --yes --no-progress
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            choco install strawberryperl --yes --no-progress
          }

          $opensslRoot = @(
            'C:\Program Files\OpenSSL-Win64',
            'C:\OpenSSL-Win64'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $opensslRoot) {
            throw 'Unable to locate the OpenSSL installation directory on the Windows runner.'
          }

          $opensslInclude = Join-Path $opensslRoot 'include'
          $opensslLib = Join-Path $opensslRoot 'lib\VC\x64'
          $opensslBin = Join-Path $opensslRoot 'bin'

          Invoke-WebRequest -Uri "https://github.com/net-snmp/net-snmp/archive/refs/tags/v$netSnmpVersion.zip" -OutFile $archivePath
          Expand-Archive -LiteralPath $archivePath -DestinationPath $sourceRoot -Force
          $netSnmpSource = Get-ChildItem -Path $sourceRoot -Directory | Select-Object -First 1

          if (-not $netSnmpSource) {
            throw 'Unable to locate the extracted Net-SNMP source directory.'
          }

          Push-Location (Join-Path $netSnmpSource.FullName 'win32')
          perl Configure --config=release --linktype=dynamic --with-sdk --with-ssl --enable-blumenthal-aes --with-ipv6 --prefix="$($installRoot -replace '\\', '/')" --with-sslincdir="$($opensslInclude -replace '\\', '/')" --with-ssllibdir="$($opensslLib -replace '\\', '/')" | Write-Host
          nmake /nologo clean
          nmake /nologo libs
          Pop-Location

          $wheelInclude = Join-Path $installRoot 'include'
          $wheelLib = Join-Path $installRoot 'lib\release'
          $wheelBin = Join-Path $installRoot 'bin\release'

          New-Item -ItemType Directory -Force -Path $wheelInclude, $wheelLib, $wheelBin | Out-Null
          Copy-Item -Path (Join-Path $netSnmpSource.FullName 'include\net-snmp') -Destination $wheelInclude -Recurse -Force
          Copy-Item -Path (Join-Path $netSnmpSource.FullName 'win32\agent') -Destination $wheelInclude -Recurse -Force
          Copy-Item -Path (Join-Path $netSnmpSource.FullName 'win32\library') -Destination $wheelInclude -Recurse -Force
          Copy-Item -Path (Join-Path $netSnmpSource.FullName 'win32\net-snmp\*.h') -Destination (Join-Path $wheelInclude 'net-snmp') -Force
          Copy-Item -Path (Join-Path $netSnmpSource.FullName 'win32\lib\release\netsnmp.lib') -Destination $wheelLib -Force
          Copy-Item -Path (Join-Path $netSnmpSource.FullName 'win32\bin\release\netsnmp.dll') -Destination $wheelBin -Force

          Add-Content -Path $env:GITHUB_ENV -Value "EZSNMP_NETSNMP_VERSION=$netSnmpVersion"
          Add-Content -Path $env:GITHUB_ENV -Value "EZSNMP_NETSNMP_INCLUDE_DIR=$wheelInclude"
          Add-Content -Path $env:GITHUB_ENV -Value "EZSNMP_NETSNMP_LIB_DIR=$wheelLib"
          Add-Content -Path $env:GITHUB_ENV -Value "EZSNMP_NETSNMP_BIN_DIR=$wheelBin"
          Add-Content -Path $env:GITHUB_ENV -Value "EZSNMP_OPENSSL_BIN_DIR=$opensslBin"

      - name: Build wheels using cibuildwheel
        uses: carlkidcrypto/os-specific-runner@3d43286418f0ea8789c57b3ba2c06df2ac176922 # v2.3.0
        with:
          linux: python -m cibuildwheel --output-dir wheelhouse --platform linux;
          macos: |
            MACOS_VERSION=$(sw_vers -productVersion)
            if [[ "$MACOS_VERSION" == "10.15."* ]]; then
                sed -i '' 's/\(MACOSX_DEPLOYMENT_TARGET = "\)[^"]*"/\110.15"/' pyproject.toml

            elif [[ "$MACOS_VERSION" == "11."* ]]; then
                sed -i '' 's/\(MACOSX_DEPLOYMENT_TARGET = "\)[^"]*"/\111.0"/' pyproject.toml

            elif [[ "$MACOS_VERSION" == "12."* ]]; then
                sed -i '' 's/\(MACOSX_DEPLOYMENT_TARGET = "\)[^"]*"/\112.0"/' pyproject.toml

            elif [[ "$MACOS_VERSION" == "13."* ]]; then
                sed -i '' 's/\(MACOSX_DEPLOYMENT_TARGET = "\)[^"]*"/\113.0"/' pyproject.toml

            elif [[ "$MACOS_VERSION" == "14."* ]]; then
                sed -i '' 's/\(MACOSX_DEPLOYMENT_TARGET = "\)[^"]*"/\114.0"/' pyproject.toml

            elif [[ "$MACOS_VERSION" == "15."* ]]; then
                sed -i '' 's/\(MACOSX_DEPLOYMENT_TARGET = "\)[^"]*"/\115.0"/' pyproject.toml

            else
                sed -i '' 's/\(MACOSX_DEPLOYMENT_TARGET = "\)[^"]*"/\110.15"/' pyproject.toml
            fi
            python -m cibuildwheel --output-dir wheelhouse --platform macos;
          windows: python -m cibuildwheel --output-dir wheelhouse --platform windows;

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  build-n-publish-test-pypi:
    name: Build and Publish To Test PyPi
    runs-on: ubuntu-latest
    environment: build_and_publish_to_test_pypi
    permissions:
      id-token: write
    needs: build_wheels

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      
      - name: Set up dependencies
        uses: carlkidcrypto/os-specific-runner@3d43286418f0ea8789c57b3ba2c06df2ac176922 # v2.3.0
        with:
          linux: sudo apt-get update;
                 sudo apt-get install -y libsnmp-dev libperl-dev;

      - name: Install pypa/build
        run: >-
          python -m
          pip install
          build
          --user

      - name: Build a source tarball
        run: >-
          python -m
          build
          --sdist
          --outdir dist/
          .

      - name: Download Wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish distribution 📦 to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.14
        with:
          packages-dir: dist/
          verify-metadata: false
          skip-existing: true
          print-hash: true
          repository-url: https://test.pypi.org/legacy/
