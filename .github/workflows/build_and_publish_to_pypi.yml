# Refer to the following link for help
# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/

name: PyPI Distributions
concurrency: build_and_publish_to_pypi
on:
  release:
    types: [published]

jobs:
  verify-syntax:
    permissions: { contents: read }
    uses: ./.github/workflows/verify_syntax.yml
  build_wheels:
    needs: verify-syntax
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        shell: bash
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare Net-SNMP for Windows wheels
        if: runner.os == 'Windows'
        uses: ./.github/actions/prepare-windows-netsnmp

      - name: Build wheels using cibuildwheel
        uses: carlkidcrypto/os-specific-runner@6bfb32d4934b42e6817f3f4109c9f3c26abc9fab # v2.3.1
        with:
          linux: python -m cibuildwheel --output-dir wheelhouse --platform linux;
          macos: |
            MACOS_VERSION=$(sw_vers -productVersion)
            MACOSX_DEPLOYMENT_TARGET=$(python -c "import build_utils; print(build_utils.resolve_macos_deployment_target('$MACOS_VERSION'))")
            sed -i '' "s/\\(MACOSX_DEPLOYMENT_TARGET = \\\"\\)[^\\\"]*\\\"/\\1${MACOSX_DEPLOYMENT_TARGET}\\\"/" pyproject.toml
            python -m cibuildwheel --output-dir wheelhouse --platform macos;
          windows: python -m cibuildwheel --output-dir wheelhouse --platform windows;

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  build-n-publish-pypi:
    name: Build and Publish To PyPi
    runs-on: ubuntu-latest
    environment: build_and_publish_to_pypi
    permissions:
      id-token: write
    needs: build_wheels

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5
      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Set up dependencies
        uses: carlkidcrypto/os-specific-runner@6bfb32d4934b42e6817f3f4109c9f3c26abc9fab # v2.3.1
        with:
          linux: sudo apt-get update;
                 sudo apt-get install -y libsnmp-dev libperl-dev;

      - name: Install pypa/build
        run: >-
          python -m
          pip install
          build
          --user

      - name: Build a source tarball
        run: >-
          python -m
          build
          --sdist
          --outdir dist/
          .

      - name: Download Wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.14
        with:
          packages-dir: dist/
          verify-metadata: false
          print-hash: true
