name: "Create Integration Branch"

on:
    workflow_dispatch:
        inputs:
            branch_name:
                description: "Integration branch name to create (e.g. mainline/release_2.3.0)"
                required: true
                default: "mainline/release_2.3.0"
            source_branch:
                description: "Source branch to create from"
                required: true
                default: "main"

permissions:
    contents: write

jobs:
    create_integration_branch:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  ref: ${{ github.event.inputs.source_branch }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Create integration branch if it does not exist
              run: |
                  BRANCH="${{ github.event.inputs.branch_name }}"
                  SOURCE="${{ github.event.inputs.source_branch }}"

                  git fetch origin

                  if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
                      echo "Branch '$BRANCH' already exists on origin — nothing to do."
                  else
                      echo "Branch '$BRANCH' does not exist. Creating from '$SOURCE' ..."
                      git checkout -b "$BRANCH"
                      git push origin "$BRANCH"
                      echo "Branch '$BRANCH' created successfully."
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
