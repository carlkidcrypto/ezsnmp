updates:
- directory: /
  ignore:
    - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
    # The following actions are used in *.lock.yml and *.md files managed by gh aw compile.
    # These files are auto-generated and should not be bumped by Dependabot.
    # Note: Dependabot does not support file-level ignore patterns for the github-actions
    # ecosystem, so these entries apply to all workflow files in this directory.
    - dependency-name: "actions/cache/restore"
    - dependency-name: "actions/cache/save"
    - dependency-name: "actions/checkout"
    - dependency-name: "actions/download-artifact"
    - dependency-name: "actions/github-script"
    - dependency-name: "actions/setup-node"
    - dependency-name: "actions/upload-artifact"
  open-pull-requests-limit: 10
  package-ecosystem: github-actions
  schedule:
    interval: daily
- directory: /
  open-pull-requests-limit: 10
  package-ecosystem: pip
  schedule:
    interval: daily
version: 2
