updates:
- directory: /
  # Agentic workflow lock files are auto-generated by gh aw compile.
  # Dependabot should not open PRs for those manifests.
  exclude-paths:
    - ".github/workflows/*.lock.yml"
    - ".github/workflows/*.md"
  open-pull-requests-limit: 10
  package-ecosystem: github-actions
  schedule:
    interval: daily
- directory: /
  open-pull-requests-limit: 10
  package-ecosystem: pip
  schedule:
    interval: daily
version: 2
